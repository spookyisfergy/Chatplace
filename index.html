<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mega Multiplayer Sandbox XL</title>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root {
            --accent: #e67e22;
            --bg: #1a1a1a;
            --panel: #2d2d2d;
        }
        html, body {
            width: 100%; height: 100%; margin: 0;
            background-color: #000; color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh;
            padding-top: 10px;
        }
        .header { margin-bottom: 5px; text-align: center; }
        .header h1 { font-size: 14px; margin: 0 0 5px 0; color: var(--accent); text-shadow: 2px 2px #000; }
        
        canvas {
            border: 4px solid #333;
            image-rendering: pixelated;
            background: #050505;
            box-shadow: 0 0 30px rgba(230, 126, 34, 0.2);
            cursor: crosshair;
            width: 600px; height: 600px;
            max-width: 95vw; max-height: 50vh;
        }
        
        .ui-panel {
            background: var(--panel);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            display: flex; flex-direction: column; gap: 8px;
            width: 95%; max-width: 800px;
            box-sizing: border-box;
            border: 2px solid #444;
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
        }

        button {
            background: #3d3d3d; color: #fff; border: none;
            padding: 10px 4px; font-size: 8px; cursor: pointer;
            border-bottom: 4px solid #1a1a1a;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        button:hover { background: #4d4d4d; }
        button.active { 
            background: var(--accent); 
            border-bottom: 4px solid #a05a1a;
            transform: translateY(2px);
        }
        
        .controls-row {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #444; padding-top: 10px;
            gap: 15px;
        }

        .slider-container {
            display: flex; align-items: center; gap: 10px; font-size: 9px;
        }

        input[type=range] {
            cursor: pointer;
            accent-color: var(--accent);
            width: 100px;
        }

        #status { font-size: 8px; color: #00ff00; letter-spacing: 1px; }
        .btn-special { background: #c0392b; border-bottom-color: #7b241c; }
        .btn-online { background: #27ae60; border-bottom-color: #1e8449; }
        .btn-online.active { background: #2980b9; border-bottom-color: #1a5276; }

        .element-grid::-webkit-scrollbar { width: 6px; }
        .element-grid::-webkit-scrollbar-track { background: #1a1a1a; }
        .element-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h1>REALM BEYOND v3.1</h1>
        <div id="status">INIT...</div>
    </div>

    <canvas id="sandCanvas"></canvas>
    
    <div class="ui-panel">
        <div class="element-grid" id="controls"></div>
        <div class="controls-row">
            <div class="slider-container">
                <span>Brush</span>
                <input type="range" id="brushSlider" min="1" max="12" value="3" oninput="updateBrush(this.value)">
                <span id="brush-val">3</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="clearGrid()" class="btn-special">Clear</button>
                <button onclick="toggleOnline()" id="sync-btn" class="btn-online">Go Live</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mega-sandbox-xl';

    const WIDTH = 150; // Slightly smaller grid for stability
    const HEIGHT = 150;
    const EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, FIRE = 4, WOOD = 5, GUNPOWDER = 6, ACID = 7, STEAM = 8, LAVA = 9, OBSIDIAN = 10;

    const ELEMENTS = {
        [EMPTY]: { name: 'Eraser', color: '#000000' },
        [SAND]: { name: 'Sand', color: '#f1c40f' },
        [WATER]: { name: 'Water', color: '#3498db' },
        [WALL]: { name: 'Steel', color: '#7f8c8d' },
        [WOOD]: { name: 'Wood', color: '#a36629' },
        [FIRE]: { name: 'Fire', color: '#e67e22' },
        [GUNPOWDER]: { name: 'Powder', color: '#555555' },
        [ACID]: { name: 'Acid', color: '#2ecc71' },
        [STEAM]: { name: 'Steam', color: '#bdc3c7' },
        [LAVA]: { name: 'Lava', color: '#ff4d00' },
        [OBSIDIAN]: { name: 'Obsid', color: '#2c003e' }
    };

    let grid = Array(HEIGHT).fill().map(() => new Uint8Array(WIDTH));
    let currentElement = SAND;
    let brushSize = 3;
    let isOnline = false;
    let user = null;
    let isDirty = false;
    let lastSyncTime = 0;

    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // Run-Length Encoding to shrink data size for Firestore
    function encodeGrid(grid) {
        let flat = [];
        for(let y=0; y<HEIGHT; y++) for(let x=0; x<WIDTH; x++) flat.push(grid[y][x]);
        let encoded = [];
        let count = 1;
        for(let i=0; i<flat.length; i++) {
            if(flat[i] === flat[i+1] && count < 255) {
                count++;
            } else {
                encoded.push(flat[i], count);
                count = 1;
            }
        }
        return encoded;
    }

    function decodeGrid(encoded) {
        let flat = [];
        for(let i=0; i<encoded.length; i+=2) {
            let val = encoded[i];
            let count = encoded[i+1];
            for(let j=0; j<count; j++) flat.push(val);
        }
        for(let y=0; y<HEIGHT; y++) {
            grid[y].set(flat.slice(y*WIDTH, (y+1)*WIDTH));
        }
    }

    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };
    initAuth();

    onAuthStateChanged(auth, (u) => {
        user = u;
        if(u) document.getElementById('status').innerText = "LOCAL MODE";
    });

    window.updateBrush = (val) => {
        brushSize = parseInt(val);
        document.getElementById('brush-val').innerText = val;
    };

    const getWorldDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'world_v3', 'main_state');

    window.toggleOnline = async () => {
        if (!user) return;
        const btn = document.getElementById('sync-btn');
        const status = document.getElementById('status');
        
        if (!isOnline) {
            isOnline = true;
            btn.innerText = "Disconnect";
            btn.classList.add('active');
            status.innerText = "SYNCING...";
            
            const worldDocRef = getWorldDocRef();
            onSnapshot(worldDocRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.updatedBy !== user.uid && (Date.now() - lastSyncTime > 1000)) {
                        decodeGrid(data.data);
                        status.innerText = "ONLINE";
                    }
                }
            }, (err) => { status.innerText = "OFFLINE (ERR)"; });
            
            syncLoop();
        } else {
            location.reload(); // Cleanest way to kill listeners
        }
    };

    async function syncLoop() {
        if (!isOnline) return;
        if (isDirty) {
            try {
                lastSyncTime = Date.now();
                const worldDocRef = getWorldDocRef();
                await setDoc(worldDocRef, {
                    data: encodeGrid(grid),
                    updatedBy: user.uid,
                    ts: Date.now()
                });
                isDirty = false;
            } catch(e) { console.error(e); }
        }
        setTimeout(syncLoop, 2000); // 2 second throttle
    }

    function updatePhysics() {
        const xDir = Math.random() > 0.5 ? 1 : -1;
        for (let y = HEIGHT - 1; y >= 0; y--) {
            for (let x = 0; x < WIDTH; x++) {
                const type = grid[y][x];
                if (type === EMPTY || type === WALL || type === OBSIDIAN) continue;

                if (type === SAND || type === GUNPOWDER) {
                    if (y < HEIGHT - 1) {
                        if (grid[y+1][x] === EMPTY || grid[y+1][x] === WATER) {
                            let old = grid[y+1][x]; grid[y+1][x] = type; grid[y][x] = old;
                        } else if (x + xDir >= 0 && x + xDir < WIDTH && grid[y+1][x+xDir] === EMPTY) {
                            grid[y+1][x+xDir] = type; grid[y][x] = EMPTY;
                        }
                    }
                } else if (type === WATER || type === LAVA || type === ACID) {
                    if (y < HEIGHT - 1 && grid[y+1][x] === EMPTY) {
                        grid[y+1][x] = type; grid[y][x] = EMPTY;
                    } else {
                        const side = Math.random() > 0.5 ? 1 : -1;
                        if (x+side >= 0 && x+side < WIDTH && grid[y][x+side] === EMPTY) {
                            grid[y][x+side] = type; grid[y][x] = EMPTY;
                        }
                    }
                } else if (type === FIRE || type === STEAM) {
                    if (Math.random() < 0.05) { grid[y][x] = EMPTY; continue; }
                    if (y > 0 && grid[y-1][x] === EMPTY) {
                        grid[y-1][x] = type; grid[y][x] = EMPTY;
                    }
                }
            }
        }
    }

    function draw() {
        const imageData = ctx.createImageData(WIDTH, HEIGHT);
        const data = imageData.data;
        for (let i = 0; i < WIDTH * HEIGHT; i++) {
            const y = Math.floor(i / WIDTH);
            const x = i % WIDTH;
            const type = grid[y][x];
            const color = ELEMENTS[type].color;
            const r = parseInt(color.slice(1,3), 16);
            const g = parseInt(color.slice(3,5), 16);
            const b = parseInt(color.slice(5,7), 16);
            const idx = i * 4;
            data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    const controls = document.getElementById('controls');
    Object.entries(ELEMENTS).forEach(([id, info]) => {
        const btn = document.createElement('button');
        btn.innerText = info.name;
        btn.id = `btn-${id}`;
        if (id == SAND) btn.className = 'active';
        btn.onclick = () => {
            currentElement = parseInt(id);
            document.querySelectorAll('.element-grid button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        controls.appendChild(btn);
    });

    window.clearGrid = () => {
        for(let y=0; y<HEIGHT; y++) grid[y].fill(0);
        isDirty = true;
    };

    let isDrawing = false;
    const handleInput = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = Math.floor((clientX - rect.left) / (rect.width / WIDTH));
        const y = Math.floor((clientY - rect.top) / (rect.height / HEIGHT));
        
        for(let i = -brushSize; i <= brushSize; i++) {
            for(let j = -brushSize; j <= brushSize; j++) {
                if(i*i + j*j > brushSize*brushSize) continue;
                const nx = x + i, ny = y + j;
                if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
                    grid[ny][nx] = currentElement;
                    isDirty = true;
                }
            }
        }
    };

    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});

    function loop() {
        updatePhysics();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
