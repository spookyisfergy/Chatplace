<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANDBOXELS ULTRA - FIXED MULTIPLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;700&display=swap');
        
        body {
            background: #050508;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas {
            image-rendering: pixelated;
            background: #000;
            cursor: crosshair;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: 1px solid #111;
        }

        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            width: 320px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        .panel-header {
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 242, 255, 0.05);
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .el-btn {
            aspect-ratio: 1;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: 0.1s;
        }

        .el-btn:hover { border-color: #00f2ff; background: rgba(0, 242, 255, 0.1); }
        .el-btn.active { border-color: #fff; box-shadow: 0 0 10px #00f2ff; background: rgba(0, 242, 255, 0.2); }
        .el-btn span { font-size: 8px; margin-top: 2px; color: #aaa; font-weight: bold; }

        #connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 10px;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
        .status-dot.online { background: #00f2ff; box-shadow: 0 0 8px #00f2ff; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #brush-circle {
            position: absolute;
            pointer-events: none;
            border: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="brush-circle"></div>
    </div>

    <div id="connection-status">
        <div id="dot" class="status-dot"></div>
        <span id="status-text">CONNECTING...</span>
    </div>

    <div class="hud-panel" style="top: 20px; left: 20px;">
        <div class="panel-header">
            <span>ELEMENT_CORE</span>
            <span id="user-label" class="opacity-40 text-[9px]">ID: ----</span>
        </div>
        <div class="element-grid" id="element-list"></div>
        <div class="p-4 border-t border-white/10 space-y-3">
            <div class="flex justify-between text-[9px] uppercase font-bold text-gray-400">
                <span>Brush Size</span>
                <span id="bsize-num" class="text-cyan-400">8</span>
            </div>
            <input type="range" id="brush-size" min="1" max="30" value="8" class="w-full accent-cyan-500">
            <button id="reset-btn" class="w-full py-2 bg-red-900/20 border border-red-500/30 text-red-400 text-[10px] hover:bg-red-500 hover:text-white transition-all font-bold">WIPE SIMULATION</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Simulation Constants
        const WIDTH = 200;
        const HEIGHT = 150;
        
        // Define grid globally for access from UI buttons
        window.grid = new Int32Array(WIDTH * HEIGHT);
        
        const ELEMENTS = [
            { id: 0, name: 'AIR', color: '#000000', icon: '💨' },
            { id: 2, name: 'SAND', color: '#e3b448', icon: '⏳', type: 'powder' },
            { id: 10, name: 'WATER', color: '#2196f3', icon: '💧', type: 'liquid' },
            { id: 13, name: 'LAVA', color: '#ff5722', icon: '🔥', type: 'liquid' },
            { id: 1, name: 'WALL', color: '#444444', icon: '🧱', type: 'solid' },
            { id: 20, name: 'PLANT', color: '#4caf50', icon: '🌿', type: 'solid' },
            { id: 24, name: 'FIRE', color: '#ffca28', icon: '♨️', type: 'gas' },
            { id: 31, name: 'WIRE', color: '#7e57c2', icon: '⚡', type: 'solid' }
        ];

        let selectedElement = 2;
        let brushSize = 8;
        let isDrawing = false;
        let user = null;

        // UI Setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const elList = document.getElementById('element-list');
        ELEMENTS.forEach(el => {
            const btn = document.createElement('div');
            btn.className = `el-btn ${el.id === selectedElement ? 'active' : ''}`;
            btn.innerHTML = `${el.icon}<span>${el.name}</span>`;
            btn.onclick = () => {
                selectedElement = el.id;
                document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            elList.appendChild(btn);
        });

        // Fix ReferenceError by binding reset button correctly
        document.getElementById('reset-btn').onclick = () => {
            window.grid.fill(0);
        };

        // Firebase Core Logic
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sand-ultra-fixed';

        async function startMultiplayer() {
            try {
                // 1. Auth Handshake
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        document.getElementById('dot').classList.add('online');
                        document.getElementById('status-text').innerText = 'LIVE SYNC';
                        document.getElementById('user-label').innerText = `ID: ${u.uid.slice(0,6)}`;
                        
                        // 2. Setup Listener AFTER auth is confirmed
                        setupListeners();
                    }
                });
            } catch (e) {
                document.getElementById('status-text').innerText = 'SYNC ERROR';
                console.error(e);
            }
        }

        function setupListeners() {
            const path = collection(db, 'artifacts', appId, 'public', 'data', 'strokes');
            // We only care about new strokes added while we are playing
            onSnapshot(path, (snap) => {
                snap.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        // If it's from someone else, paint it!
                        if (data.userId !== user.uid) {
                            applyPaint(data.x, data.y, data.type, data.size, false);
                        }
                    }
                });
            }, (err) => {
                console.error("Firestore error:", err);
            });
        }

        function applyPaint(x, y, type, size, sync = true) {
            const radiusSq = size * size;
            for (let i = -size; i <= size; i++) {
                for (let j = -size; j <= size; j++) {
                    if (i*i + j*j > radiusSq) continue;
                    const nx = Math.floor(x + i);
                    const ny = Math.floor(y + j);
                    if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
                        const idx = ny * WIDTH + nx;
                        if (window.grid[idx] !== 1) window.grid[idx] = type;
                    }
                }
            }

            // Sync with friend
            if (sync && user && Math.random() > 0.8) { // Moderate throttling to prevent lag
                addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'strokes'), {
                    x, y, type, size, userId: user.uid, ts: serverTimestamp()
                }).catch(e => console.warn("Sync missed"));
            }
        }

        // Interaction
        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX - rect.left) * (WIDTH / rect.width);
            const y = (clientY - rect.top) * (HEIGHT / rect.height);
            
            const cursor = document.getElementById('brush-circle');
            cursor.style.left = clientX + 'px';
            cursor.style.top = clientY + 'px';
            cursor.style.width = (brushSize * (rect.width/WIDTH) * 2) + 'px';
            cursor.style.height = (brushSize * (rect.width/WIDTH) * 2) + 'px';

            if (isDrawing) applyPaint(x, y, selectedElement, brushSize, true);
        }

        window.addEventListener('mousedown', (e) => { if(!e.target.closest('.hud-panel')) isDrawing = true; });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', (e) => { if(!e.target.closest('.hud-panel')) isDrawing = true; handleInput(e); });
        window.addEventListener('touchend', () => isDrawing = false);
        window.addEventListener('touchmove', (e) => { if(!e.target.closest('.hud-panel')) { e.preventDefault(); handleInput(e); } }, {passive: false});
        
        document.getElementById('brush-size').oninput = (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('bsize-num').innerText = brushSize;
        };

        // Engine
        function update() {
            for (let y = HEIGHT - 1; y >= 0; y--) {
                for (let x = 0; x < WIDTH; x++) {
                    const idx = y * WIDTH + x;
                    const p = window.grid[idx];
                    if (p === 0 || p === 1 || p === 31 || p === 20) continue;

                    const el = ELEMENTS.find(e => e.id === p);
                    if (!el) continue;

                    if (el.type === 'powder') {
                        if (y < HEIGHT - 1) {
                            if (window.grid[(y+1)*WIDTH + x] === 0) {
                                window.grid[idx] = 0; window.grid[(y+1)*WIDTH + x] = p;
                            } else {
                                const dir = Math.random() < 0.5 ? -1 : 1;
                                if (x+dir >= 0 && x+dir < WIDTH && window.grid[(y+1)*WIDTH + (x+dir)] === 0) {
                                    window.grid[idx] = 0; window.grid[(y+1)*WIDTH + (x+dir)] = p;
                                }
                            }
                        }
                    } else if (el.type === 'liquid') {
                        if (y < HEIGHT - 1 && window.grid[(y+1)*WIDTH + x] === 0) {
                            window.grid[idx] = 0; window.grid[(y+1)*WIDTH + x] = p;
                        } else {
                            const dir = Math.random() < 0.5 ? -1 : 1;
                            if (x+dir >= 0 && x+dir < WIDTH && window.grid[y*WIDTH + (x+dir)] === 0) {
                                window.grid[idx] = 0; window.grid[y*WIDTH + (x+dir)] = p;
                            }
                        }
                    } else if (el.type === 'gas') {
                        if (Math.random() > 0.9) window.grid[idx] = 0;
                        const ny = y - 1;
                        const nx = x + (Math.floor(Math.random()*3)-1);
                        if (ny >= 0 && nx >= 0 && nx < WIDTH && window.grid[ny*WIDTH+nx] === 0) {
                            window.grid[idx] = 0; window.grid[ny*WIDTH+nx] = p;
                        }
                    }
                }
            }
        }

        const imgData = ctx.createImageData(WIDTH, HEIGHT);
        function draw() {
            for (let i = 0; i < window.grid.length; i++) {
                const el = ELEMENTS.find(e => e.id === window.grid[i]) || ELEMENTS[0];
                const idx = i * 4;
                const r = parseInt(el.color.slice(1,3), 16);
                const g = parseInt(el.color.slice(3,5), 16);
                const b = parseInt(el.color.slice(5,7), 16);
                imgData.data[idx] = r;
                imgData.data[idx+1] = g;
                imgData.data[idx+2] = b;
                imgData.data[idx+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        startMultiplayer();
        loop();
    </script>
</body>
</html>
