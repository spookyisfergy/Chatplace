<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GambleTits - Pro Casino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .logo-font { font-family: 'Bungee', cursive; }
        .glass { background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        
        /* Game Specific UI */
        .green-felt { background: radial-gradient(circle at center, #065f46 0%, #022c22 100%); border: 8px solid #1a1a1a; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Case Opening Animation */
        .case-reel {
            display: flex;
            transition: transform 6s cubic-bezier(0.1, 0, 0, 1);
            will-change: transform;
        }
        .weapon-card {
            min-width: 160px;
            height: 200px;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            border-bottom: 4px solid #4b5563;
        }
        .rarity-covert { border-color: #eb4b4b; background: radial-gradient(circle at top, rgba(235, 75, 75, 0.1), transparent); }
        .rarity-classified { border-color: #d32ee6; }
        .rarity-restricted { border-color: #8847ff; }
        .rarity-mil-spec { border-color: #4b69ff; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(235, 75, 75, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(235, 75, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(235, 75, 75, 0); }
        }
        .crashed { animation: pulse-red 0.5s ease-in-out; color: #ef4444; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyALwQlZIMapFrJdc6yS57SGQfB3-cSfkBA",
            authDomain: "chatroon-4ded8.firebaseapp.com",
            projectId: "chatroon-4ded8",
            storageBucket: "chatroon-4ded8.firebasestorage.app",
            messagingSenderId: "779421378038",
            appId: "1:779421378038:web:2cdf14f30742d7e42f93d7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const APP_ID = 'gt-final-v1';
        const SESSION_ID = 'lobby-alpha';

        const WEAPONS = [
            { name: "AWP | Dragon Lore", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7cqWdQ-sJ0xOzAot-je9vjxS_j_hVvYm6hcVdsYV_T_ge_x-u7h5C0vM6bmHpgu3Qm-z-DyDC9v060/360fx360f", rarity: "covert" },
            { name: "AK-47 | Fire Serpent", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjx2jJemkV09-5lpKKqPrxN7LEmyVQ7MEp27-S99SmiwS3_hU6YTuhLIDAdwU9N16C-Fi7k7_mhsS_vJ6bn3RruSAnty7D30vgS_f8_m4/360fx360f", rarity: "covert" },
            { name: "M4A4 | Howl", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjx2jJemkV09_km4mYm_L_MOfshXhYupJ33rzD99SmiwS3rhU5Ym_yctfGIVQ7MAnV_1e2x-65hJW_uM_AnHdgvygh7GGHl0Gzh09SLrs47VvXowA/360fx360f", rarity: "covert" },
            { name: "USP-S | Kill Confirmed", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m1FBRp3_bGcjhQ09-jq5WYh8j_OrfdqWhe5sN4mOTE8bP4jVC9vh5yZmqid9SccVVrZArR-Fm_xO7v0Z-76Z_ByXU27iYm4H_D30vgfUsh9m8/360fx360f", rarity: "covert" },
            { name: "Desert Eagle | Printstream", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposr-kFAR17PLfYQJF_tW7m5a0mvLwOq7c2D0JuZ0m3L-RrNisjAax-0U4ZmqgcYSWclRrZVHY8wS4w7q5g5S87cmamGwj5Hev9XUf/360fx360f", rarity: "covert" }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [username, setUsername] = useState('');
            const [role, setRole] = useState(null);
            const [activeTab, setActiveTab] = useState('blackjack');
            const [balance, setBalance] = useState(1000);
            const [gameState, setGameState] = useState({
                blackjack: { dealer: [], player: [], status: 'waiting' },
                crash: { mult: 1.0, status: 'counting', history: [] },
                roulette: { last: 0, status: 'idle' },
                chat: []
            });
            const [caseRolling, setCaseRolling] = useState(false);
            const [caseItems, setCaseItems] = useState([]);
            const [caseResult, setCaseResult] = useState(null);
            
            const sessionRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('sessions').doc(SESSION_ID);
            const reelRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const cred = await auth.signInAnonymously();
                    setUser(cred.user);
                    const name = localStorage.getItem('gt_name') || `User_${Math.floor(Math.random()*9000)}`;
                    setUsername(name);
                };
                init();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = sessionRef.onSnapshot(doc => {
                    if (doc.exists) setGameState(doc.data());
                    else if (role === 'dealer') resetSystem();
                });
                return () => unsub();
            }, [user, role]);

            // Global Crash Logic (Simulated sync)
            useEffect(() => {
                if (activeTab === 'crash') {
                    // Logic would normally be server-side, here we use the shared state
                }
            }, [gameState.crash]);

            const resetSystem = () => {
                sessionRef.set({
                    blackjack: { dealer: [], player: [], status: 'waiting' },
                    crash: { mult: 1.0, status: 'counting', history: [] },
                    roulette: { last: 0, status: 'idle' },
                    chat: [{ user: 'SYSTEM', text: 'Casino is now LIVE.', time: Date.now() }],
                    hostFrame: null
                });
            };

            const sync = (upd) => sessionRef.update(upd).catch(() => resetSystem());

            const runCrash = () => {
                if (role !== 'dealer') return;
                let current = 1.0;
                const crashAt = (Math.random() * 5 + 1).toFixed(2);
                
                sync({ 'crash.status': 'live' });
                
                const timer = setInterval(() => {
                    current = (parseFloat(current) + 0.01).toFixed(2);
                    if (current >= crashAt) {
                        clearInterval(timer);
                        sync({ 'crash.status': 'crashed', 'crash.mult': current });
                        setTimeout(() => sync({ 'crash.status': 'counting', 'crash.mult': 1.0 }), 3000);
                    } else {
                        sync({ 'crash.mult': current });
                    }
                }, 100);
            };

            const openCase = () => {
                if (balance < 250) return;
                setBalance(b => b - 250);
                setCaseRolling(true);
                setCaseResult(null);
                
                const items = Array.from({ length: 50 }, () => WEAPONS[Math.floor(Math.random() * WEAPONS.length)]);
                const winIndex = 45;
                setCaseItems(items);

                setTimeout(() => {
                    setCaseResult(items[winIndex]);
                    setCaseRolling(false);
                }, 6000);
            };

            const Card = ({ val, suit }) => (
                <div className="w-20 h-32 bg-white rounded-xl flex flex-col p-2 text-black card-shadow font-black animate-deal border-2 border-black/10">
                    <div className="text-xl">{val}</div>
                    <div className="flex-1 flex items-center justify-center text-5xl">{suit}</div>
                </div>
            );

            if (!role) return (
                <div className="h-screen flex items-center justify-center bg-[#050505]">
                    <div className="max-w-md w-full glass p-12 rounded-[3.5rem] text-center shadow-2xl">
                        <h1 className="logo-font text-5xl mb-4 italic tracking-tighter">GAMBLE<span className="text-pink-600">TITS</span></h1>
                        <p className="text-[10px] font-black uppercase tracking-[0.4em] mb-12 text-slate-500">Professional Grade Betting</p>
                        <input 
                            value={username} 
                            onChange={e => setUsername(e.target.value)}
                            className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 text-center text-lg font-bold mb-6 focus:border-pink-500 outline-none"
                            placeholder="DISPLAY NAME"
                        />
                        <button onClick={() => setRole('player')} className="w-full py-6 bg-pink-600 rounded-3xl font-black italic uppercase tracking-widest hover:bg-pink-500 transition-all text-xl shadow-lg">Enter Floor</button>
                        <button onClick={() => { if(prompt("Pass?") === "6969") setRole('dealer') }} className="mt-8 text-[10px] font-black text-slate-700 hover:text-white transition-colors cursor-pointer uppercase">Host Access</button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex bg-[#020202] overflow-hidden">
                    {/* Side Nav */}
                    <div className="w-72 border-r border-white/5 flex flex-col glass z-50">
                        <div className="p-10 text-3xl logo-font italic text-pink-500">GT</div>
                        <nav className="flex-1 px-6 space-y-3">
                            {[
                                { id: 'blackjack', icon: '🃏', label: 'Blackjack' },
                                { id: 'crash', icon: '📈', label: 'Crash' },
                                { id: 'cases', icon: '📦', label: 'Case Opening' },
                                { id: 'roulette', icon: '🎡', label: 'Roulette' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full p-5 rounded-2xl flex items-center gap-4 transition-all ${activeTab === t.id ? 'bg-pink-600 shadow-xl' : 'hover:bg-white/5 text-slate-500'}`}>
                                    <span className="text-xl">{t.icon}</span>
                                    <span className="font-black uppercase text-[10px] tracking-widest">{t.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-8 mt-auto border-t border-white/5">
                            <div className="text-[10px] font-black text-slate-500 uppercase mb-2">My Balance</div>
                            <div className="text-3xl font-black italic text-green-500">${balance.toLocaleString()}</div>
                        </div>
                    </div>

                    {/* Main Stage */}
                    <div className="flex-1 flex flex-col relative">
                        <header className="h-24 glass flex items-center justify-between px-12 border-b border-white/5">
                            <div className="flex items-center gap-4">
                                <div className="w-3 h-3 rounded-full bg-green-500 animate-pulse" />
                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Live Session: {SESSION_ID}</span>
                            </div>
                            <div className="flex gap-4">
                                {role === 'dealer' && (
                                    <button onClick={resetSystem} className="px-6 py-3 bg-red-600/10 text-red-500 border border-red-500/20 rounded-xl text-[10px] font-black uppercase">Force Reset</button>
                                )}
                            </div>
                        </header>

                        <main className="flex-1 p-10 overflow-hidden">
                            {activeTab === 'blackjack' && (
                                <div className="h-full green-felt rounded-[4rem] relative flex flex-col items-center justify-between py-20 shadow-inner">
                                    <div className="flex flex-col items-center gap-6">
                                        <div className="flex gap-4 min-h-[128px]">
                                            {gameState.blackjack.dealer.map((c, i) => <Card key={i} {...c} />)}
                                        </div>
                                        <div className="px-6 py-2 bg-black/40 rounded-full text-[10px] font-black uppercase tracking-widest text-white/40">Dealer</div>
                                    </div>

                                    <div className="flex flex-col items-center gap-6">
                                        <div className="px-6 py-2 bg-black/40 rounded-full text-[10px] font-black uppercase tracking-widest text-white/40">Player</div>
                                        <div className="flex gap-4 min-h-[128px]">
                                            {gameState.blackjack.player.map((c, i) => <Card key={i} {...c} />)}
                                        </div>
                                    </div>

                                    <div className="absolute bottom-12 flex gap-6">
                                        {role === 'dealer' ? (
                                            <button onClick={() => {
                                                const draw = () => ({ val: ['A','K','Q','J','10','9'][Math.floor(Math.random()*6)], suit: '♠' });
                                                sync({ 'blackjack.dealer': [draw()], 'blackjack.player': [draw(), draw()], 'blackjack.status': 'live' });
                                            }} className="px-12 py-5 bg-white text-black font-black rounded-2xl uppercase italic text-sm">Deal Global Hand</button>
                                        ) : (
                                            <>
                                                <button className="w-40 py-5 bg-blue-600 rounded-2xl font-black uppercase text-xs italic shadow-[0_6px_0_#1d4ed8]">Hit</button>
                                                <button className="w-40 py-5 bg-slate-800 rounded-2xl font-black uppercase text-xs italic shadow-[0_6px_0_#0f172a]">Stand</button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'crash' && (
                                <div className="h-full glass rounded-[4rem] flex flex-col items-center justify-center relative overflow-hidden">
                                    <div className={`text-[180px] font-black italic transition-all duration-100 ${gameState.crash.status === 'crashed' ? 'crashed' : 'text-pink-500'}`}>
                                        {gameState.crash.mult}<span className="text-6xl">x</span>
                                    </div>
                                    <div className="text-slate-500 font-black uppercase tracking-[1em] mb-12">
                                        {gameState.crash.status === 'counting' ? 'Waiting for start...' : 
                                         gameState.crash.status === 'crashed' ? 'CRASHED!' : 'Rocket is Live'}
                                    </div>
                                    
                                    {role === 'dealer' && gameState.crash.status === 'counting' && (
                                        <button onClick={runCrash} className="px-16 py-6 bg-pink-600 rounded-3xl font-black uppercase italic text-lg shadow-xl hover:scale-105 transition-transform">Start Round</button>
                                    )}

                                    {role === 'player' && (
                                        <div className="flex gap-4">
                                            <input className="bg-white/5 border border-white/10 px-8 py-5 rounded-2xl font-black text-xl w-64 text-center outline-none" placeholder="$ BET" />
                                            <button className="px-12 bg-green-600 rounded-2xl font-black uppercase italic text-sm">Bet & Fly</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'cases' && (
                                <div className="h-full flex flex-col items-center justify-center gap-12">
                                    <div className="w-full max-w-4xl relative">
                                        {/* Marker */}
                                        <div className="absolute left-1/2 top-0 bottom-0 w-1 bg-yellow-500 z-20 shadow-[0_0_15px_rgba(234,179,8,0.5)]" />
                                        
                                        <div className="h-64 glass rounded-3xl overflow-hidden border border-white/10 relative">
                                            <div className="case-reel" style={{ 
                                                transform: caseRolling ? `translateX(-${45 * 160}px)` : 'translateX(0px)',
                                                transition: caseRolling ? 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)' : 'none'
                                            }}>
                                                {caseItems.map((item, i) => (
                                                    <div key={i} className={`weapon-card p-4 flex flex-col items-center justify-between border-b-8 rarity-${item.rarity}`}>
                                                        <img src={item.img} className="w-24 h-24 object-contain drop-shadow-2xl" />
                                                        <div className="text-[8px] font-black uppercase text-center leading-tight opacity-60">{item.name}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col items-center gap-6">
                                        <button 
                                            disabled={caseRolling} 
                                            onClick={openCase} 
                                            className={`px-20 py-8 ${caseRolling ? 'bg-slate-800' : 'bg-yellow-600 hover:bg-yellow-500'} rounded-[2rem] font-black uppercase italic text-xl shadow-2xl transition-all`}
                                        >
                                            Open Case ($250)
                                        </button>
                                        {caseResult && !caseRolling && (
                                            <div className="animate-bounce text-yellow-500 font-black uppercase tracking-widest text-lg">
                                                You won: {caseResult.name}!
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Chat Feed */}
                    <div className="w-96 glass border-l border-white/5 flex flex-col">
                        <div className="p-8 border-b border-white/5 font-black uppercase text-[10px] tracking-widest text-slate-500">Live Activity</div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4">
                            {gameState.chat.slice(-20).map((m, i) => (
                                <div key={i} className="animate-in slide-in-from-right duration-300">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className={`text-[10px] font-black uppercase ${m.user === 'SYSTEM' ? 'text-pink-500' : 'text-blue-500'}`}>{m.user}</span>
                                        <span className="text-[8px] text-slate-700">{new Date(m.time).toLocaleTimeString()}</span>
                                    </div>
                                    <div className="text-sm bg-white/5 p-4 rounded-2xl border border-white/5 text-slate-300 font-medium">
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            const val = e.target.msg.value;
                            if (!val) return;
                            sync({ chat: [...gameState.chat, { user: username, text: val, time: Date.now() }] });
                            e.target.reset();
                        }} className="p-8 bg-black/40">
                            <input name="msg" className="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-sm outline-none focus:border-pink-500 transition-colors" placeholder="Message the table..." />
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
