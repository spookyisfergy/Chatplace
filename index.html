<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChatZone OS v8.0</title>
    <style>
        body { background-color: #008080; font-family: "MS Sans Serif", sans-serif; font-size: 12px; margin: 0; height: 100vh; overflow: hidden; }
        .window { position: absolute; background: #d4d0c8; border: 2px outset #fff; padding: 3px; display: none; z-index: 1000; }
        .title-bar { background: #000080; color: white; padding: 2px 5px; font-weight: bold; cursor: move; }
        .win-content { padding: 10px; }
        #chat-box { height: 150px; background: #fff; border: 2px inset #fff; overflow-y: scroll; }
        #member-list { height: 150px; background: #fff; border: 2px inset #fff; margin-top: 5px; }
        .desktop-icon { width: 64px; text-align: center; color: white; cursor: pointer; margin: 20px; float: left; }
    </style>
</head>
<body>

<div id="login-window" class="window" style="display:block; top:30%; left:40%; z-index:9999;">
    <div class="title-bar">Login</div>
    <div class="win-content">
        <input type="text" id="login-user" placeholder="Username"><br><br>
        <button id="btn-login">Enter Server</button>
    </div>
</div>

<div class="desktop">
    <div class="desktop-icon" onclick="document.getElementById('chat-window').style.display='block'"><span>Chat</span></div>
    <div class="desktop-icon" onclick="document.getElementById('radio-window').style.display='block'"><span>Radio</span></div>
</div>

<div id="radio-window" class="window" style="top:50px; left:300px; width:320px;">
    <div class="title-bar">ChatAmp Radio</div>
    <div class="win-content">
        <iframe id="sc-player" width="300" height="166" src=""></iframe>
        <input type="text" id="radio-url" placeholder="SoundCloud Link">
        <button id="btn-set-radio">Set</button>
        <button id="btn-skip">Vote Skip</button>
        <div id="skip-count">Votes: 0</div>
    </div>
</div>

<div id="chat-window" class="window" style="top:100px; left:100px; width:400px;">
    <div class="title-bar">ChatZone - Online Users</div>
    <div class="win-content">
        <div id="chat-box"></div>
        <div id="member-list"></div>
        <input type="text" id="msg-input" style="width: 70%;">
        <button id="send-btn">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyBcKpDm14W4GZqQncV1LOtS3Hn5t1kK-hw", projectId: "omegle-c7bdb" }));
    let myUser = "";

    // --- Authentication & Presence ---
    document.getElementById('btn-login').onclick = async () => {
        myUser = document.getElementById('login-user').value;
        if (!myUser) return;
        await setDoc(doc(db, "online_users", myUser), { name: myUser, lastSeen: serverTimestamp() });
        document.getElementById('login-window').style.display = 'none';
        
        // Remove user on close
        window.onbeforeunload = () => deleteDoc(doc(db, "online_users", myUser));
    };

    // --- Member List Sync ---
    onSnapshot(collection(db, "online_users"), (snap) => {
        const list = document.getElementById('member-list');
        list.innerHTML = "<b>Online:</b><br>";
        snap.forEach(d => list.innerHTML += `<div>${d.data().name}</div>`);
    });

    // --- Chat Sync ---
    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('msg-input').value;
        await addDoc(collection(db, "messages"), { user: myUser, text, time: serverTimestamp() });
        document.getElementById('msg-input').value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(d => box.innerHTML += `<div><b>${d.data().user}:</b> ${d.data().text}</div>`);
    });

    // --- Radio Sync & Voting ---
    document.getElementById('btn-set-radio').onclick = async () => {
        await setDoc(doc(db, "system", "radio"), { url: document.getElementById('radio-url').value });
    };

    document.getElementById('btn-skip').onclick = async () => {
        await setDoc(doc(db, "radio_votes", myUser), { voted: true });
    };

    onSnapshot(doc(db, "system", "radio"), (snap) => {
        if(snap.exists()) {
            const url = encodeURIComponent(snap.data().url);
            document.getElementById('sc-player').src = `https://w.soundcloud.com/player/?url=${url}&auto_play=true`;
        }
    });

    onSnapshot(collection(db, "radio_votes"), async (snap) => {
        const count = snap.size;
        const totalUsers = (await getDocs(collection(db, "online_users"))).size;
        document.getElementById('skip-count').innerText = `Votes: ${count} / ${Math.ceil(totalUsers/2)}`;
        
        if (count >= totalUsers/2 && totalUsers > 0) {
            alert("Skip voted! Resetting radio...");
            // Logic to clear votes after skip
            snap.forEach(d => deleteDoc(d.ref));
        }
    });
</script>
</body>
</html>
