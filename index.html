<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mega Multiplayer Sandbox XL</title>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root {
            --accent: #e67e22;
            --bg: #1a1a1a;
            --panel: #2d2d2d;
        }
        html, body {
            width: 100%; height: 100%; margin: 0;
            background-color: #000; color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh;
            padding-top: 10px;
        }
        .header { margin-bottom: 5px; text-align: center; }
        .header h1 { font-size: 14px; margin: 0 0 5px 0; color: var(--accent); text-shadow: 2px 2px #000; }
        
        canvas {
            border: 4px solid #333;
            image-rendering: pixelated;
            background: #050505;
            box-shadow: 0 0 30px rgba(230, 126, 34, 0.2);
            cursor: crosshair;
            width: 600px; height: 600px;
            max-width: 95vw; max-height: 50vh;
        }
        
        .ui-panel {
            background: var(--panel);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            display: flex; flex-direction: column; gap: 8px;
            width: 95%; max-width: 800px;
            box-sizing: border-box;
            border: 2px solid #444;
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
        }

        button {
            background: #3d3d3d; color: #fff; border: none;
            padding: 10px 4px; font-size: 8px; cursor: pointer;
            border-bottom: 4px solid #1a1a1a;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        button:hover { background: #4d4d4d; }
        button.active { 
            background: var(--accent); 
            border-bottom: 4px solid #a05a1a;
            transform: translateY(2px);
        }
        
        .controls-row {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #444; padding-top: 10px;
            gap: 15px;
        }

        .slider-container {
            display: flex; align-items: center; gap: 10px; font-size: 9px;
        }

        input[type=range] {
            cursor: pointer;
            accent-color: var(--accent);
            width: 100px;
        }

        #status { font-size: 8px; color: #00ff00; letter-spacing: 1px; }
        .btn-special { background: #c0392b; border-bottom-color: #7b241c; }
        .btn-online { background: #27ae60; border-bottom-color: #1e8449; }
        .btn-online.active { background: #2980b9; border-bottom-color: #1a5276; }

        .element-grid::-webkit-scrollbar { width: 6px; }
        .element-grid::-webkit-scrollbar-track { background: #1a1a1a; }
        .element-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        @media (max-width: 600px) {
            .header h1 { font-size: 11px; }
            button { font-size: 7px; }
            canvas { height: 40vh; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h1>REALM BEYOND v3</h1>
        <div id="status">INIT...</div>
    </div>

    <canvas id="sandCanvas"></canvas>
    
    <div class="ui-panel">
        <div class="element-grid" id="controls"></div>
        <div class="controls-row">
            <div class="slider-container">
                <span>Brush</span>
                <input type="range" id="brushSlider" min="1" max="12" value="3" oninput="updateBrush(this.value)">
                <span id="brush-val">3</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="clearGrid()" class="btn-special">Clear All</button>
                <button onclick="toggleOnline()" id="sync-btn" class="btn-online">Go Live</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Config & Globals ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mega-sandbox-xl';

    const WIDTH = 200; 
    const HEIGHT = 200;
    const EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, FIRE = 4, WOOD = 5, GUNPOWDER = 6, ACID = 7, STEAM = 8, LAVA = 9, OBSIDIAN = 10, METHANE = 11;

    const ELEMENTS = {
        [EMPTY]: { name: 'Eraser', color: '#000000' },
        [SAND]: { name: 'Sand', color: '#f1c40f' },
        [WATER]: { name: 'Water', color: '#3498db' },
        [WALL]: { name: 'Steel', color: '#7f8c8d' },
        [WOOD]: { name: 'Wood', color: '#a36629' },
        [FIRE]: { name: 'Fire', color: '#e67e22' },
        [GUNPOWDER]: { name: 'Powder', color: '#555555' },
        [ACID]: { name: 'Acid', color: '#2ecc71' },
        [STEAM]: { name: 'Steam', color: '#bdc3c7' },
        [LAVA]: { name: 'Lava', color: '#ff4d00' },
        [OBSIDIAN]: { name: 'Obsidian', color: '#2c003e' },
        [METHANE]: { name: 'Methane', color: '#aaffff' }
    };

    let grid = Array(HEIGHT).fill().map(() => new Uint8Array(WIDTH));
    let currentElement = SAND;
    let brushSize = 3;
    let isOnline = false;
    let lastPushTime = 0;
    let user = null;
    let unsubscribeSync = null;

    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // --- Auth Implementation (RULE 3) ---
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error("Auth failed", e);
            document.getElementById('status').innerText = "AUTH ERROR";
        }
    };
    initAuth();

    onAuthStateChanged(auth, (u) => {
        user = u;
        if(u) document.getElementById('status').innerText = "LOCAL MODE";
    });

    window.updateBrush = (val) => {
        brushSize = parseInt(val);
        document.getElementById('brush-val').innerText = val;
    };

    // Helper to get correct path (RULE 1: /artifacts/{appId}/public/data/{collectionName}/{docId})
    // Note: Documents must have an even number of segments. 
    // Segment 1: artifacts
    // Segment 2: appId
    // Segment 3: public
    // Segment 4: data
    // Segment 5: collectionName (e.g. 'world_state')
    // Segment 6: documentId (e.g. 'current')
    const getWorldDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'world_state', 'v3');

    window.toggleOnline = async () => {
        if (!user) {
            document.getElementById('status').innerText = "WAITING FOR AUTH...";
            return;
        }
        const btn = document.getElementById('sync-btn');
        const status = document.getElementById('status');
        
        if (!isOnline) {
            isOnline = true;
            btn.innerText = "Leave Live";
            btn.classList.add('active');
            status.innerText = "CONNECTING...";
            
            const worldDocRef = getWorldDocRef();
            
            try {
                const initialSnap = await getDoc(worldDocRef);
                if (initialSnap.exists()) updateLocalGrid(initialSnap.data().gridData);
            } catch(e) { console.error("Initial fetch error", e); }

            unsubscribeSync = onSnapshot(worldDocRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.updatedBy !== user.uid && Date.now() - lastPushTime > 1000) {
                        updateLocalGrid(data.gridData);
                        status.innerText = "LIVE (SYNCED)";
                    }
                }
            }, (err) => {
                console.error("Firestore error", err);
                status.innerText = "SYNC ERROR";
                isOnline = false;
                btn.innerText = "Go Live";
                btn.classList.remove('active');
            });
        } else {
            isOnline = false;
            if (unsubscribeSync) unsubscribeSync();
            btn.innerText = "Go Live";
            btn.classList.remove('active');
            status.innerText = "LOCAL MODE";
        }
    };

    function updateLocalGrid(jsonStr) {
        try {
            const flat = JSON.parse(jsonStr);
            for(let y=0; y<HEIGHT; y++) grid[y].set(flat.slice(y*WIDTH, (y+1)*WIDTH));
        } catch(e) {}
    }

    async function pushToCloud() {
        if (!isOnline || !user) return;
        lastPushTime = Date.now();
        const flat = new Uint8Array(WIDTH * HEIGHT);
        for(let y=0; y<HEIGHT; y++) flat.set(grid[y], y*WIDTH);
        
        try {
            const worldDocRef = getWorldDocRef();
            await setDoc(worldDocRef, {
                gridData: JSON.stringify(Array.from(flat)),
                updatedBy: user.uid,
                ts: Date.now()
            });
            document.getElementById('status').innerText = "LIVE (UPDATED)";
        } catch(e) {
            console.error("Push error", e);
        }
    }

    // --- Physics Engine ---
    function updatePhysics() {
        const xDir = Math.random() > 0.5 ? 1 : -1;
        const yStart = Math.random() > 0.5 ? HEIGHT - 1 : 0;
        const yEnd = yStart === 0 ? HEIGHT : -1;
        const yStep = yStart === 0 ? 1 : -1;

        for (let y = yStart; y !== yEnd; y += yStep) {
            for (let x = 0; x < WIDTH; x++) {
                const type = grid[y][x];
                if (type === EMPTY || type === WALL || type === OBSIDIAN || type === WOOD) continue;

                if (type === SAND || type === GUNPOWDER) {
                    if (y < HEIGHT - 1) {
                        const below = grid[y+1][x];
                        if (below === EMPTY || below === WATER || below === ACID || below === METHANE) {
                            grid[y+1][x] = type; grid[y][x] = below;
                        } else if (x + xDir >= 0 && x + xDir < WIDTH && grid[y+1][x+xDir] === EMPTY) {
                            grid[y+1][x+xDir] = type; grid[y][x] = EMPTY;
                        }
                    }
                }
                else if (type === WATER || type === ACID || type === LAVA) {
                    let flowChance = type === LAVA ? 0.3 : 1.0;
                    if (Math.random() > flowChance) continue;
                    if (y < HEIGHT - 1 && (grid[y+1][x] === EMPTY || grid[y+1][x] === METHANE || (type === ACID && grid[y+1][x] === WATER))) {
                        const temp = grid[y+1][x];
                        grid[y+1][x] = type; grid[y][x] = temp;
                    } else {
                        const side = Math.random() > 0.5 ? 1 : -1;
                        if (x + side >= 0 && x + side < WIDTH && (grid[y][side+x] === EMPTY || grid[y][side+x] === METHANE)) {
                            grid[y][side+x] = type; grid[y][x] = EMPTY;
                        }
                    }
                    if (type === LAVA) {
                        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                            const nx = x+dx, ny = y+dy;
                            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
                                if (grid[ny][nx] === WATER) { grid[ny][nx] = STEAM; grid[y][x] = OBSIDIAN; }
                                if (grid[ny][nx] === WOOD || grid[ny][nx] === GUNPOWDER || grid[ny][nx] === METHANE) grid[ny][nx] = FIRE;
                            }
                        });
                    }
                    if (type === ACID) {
                        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                            const nx = x+dx, ny = y+dy;
                            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
                                if ((grid[ny][nx] === WOOD || grid[ny][nx] === SAND || grid[ny][nx] === WALL) && Math.random() < 0.05) {
                                    grid[ny][nx] = EMPTY;
                                    grid[y][x] = Math.random() < 0.3 ? STEAM : EMPTY;
                                }
                            }
                        });
                    }
                }
                else if (type === FIRE || type === STEAM || type === METHANE) {
                    if (type === FIRE && Math.random() < 0.15) grid[y][x] = EMPTY;
                    if (type === STEAM && Math.random() < 0.01) grid[y][x] = WATER;

                    if (y > 0 && (grid[y-1][x] === EMPTY || (type === FIRE && grid[y-1][x] === METHANE))) {
                        const below = grid[y-1][x];
                        grid[y-1][x] = type; grid[y][x] = below === METHANE ? FIRE : EMPTY;
                    } else {
                        const side = Math.random() > 0.5 ? 1 : -1;
                        if (x+side >= 0 && x+side < WIDTH && grid[y][x+side] === EMPTY) {
                            grid[y][x+side] = type; grid[y][x] = EMPTY;
                        }
                    }

                    if (type === FIRE) {
                        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                            const nx = x+dx, ny = y+dy;
                            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
                                const target = grid[ny][nx];
                                if ((target === WOOD || target === METHANE) && Math.random() < 0.3) grid[ny][nx] = FIRE;
                                if (target === GUNPOWDER) {
                                    grid[ny][nx] = FIRE;
                                    for(let i=-3; i<=3; i++) for(let j=-3; j<=3; j++) {
                                        let ex=nx+i, ey=ny+j;
                                        if (ex>=0 && ex<WIDTH && ey>=0 && ey<HEIGHT && grid[ey][ex] !== WALL && Math.random()<0.5) grid[ey][ex] = FIRE;
                                    }
                                }
                            }
                        });
                    }
                }
            }
        }
    }

    function draw() {
        const imageData = ctx.createImageData(WIDTH, HEIGHT);
        const data = imageData.data;
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                const idx = (y * WIDTH + x) * 4;
                const type = grid[y][x];
                const colorHex = ELEMENTS[type].color;
                data[idx] = parseInt(colorHex.slice(1,3), 16);
                data[idx+1] = parseInt(colorHex.slice(3,5), 16);
                data[idx+2] = parseInt(colorHex.slice(5,7), 16);
                data[idx+3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    const controls = document.getElementById('controls');
    Object.entries(ELEMENTS).forEach(([id, info]) => {
        const btn = document.createElement('button');
        btn.innerText = info.name;
        btn.id = `btn-${id}`;
        btn.style.borderLeft = `6px solid ${info.color}`;
        if (id == SAND) btn.className = 'active';
        btn.onclick = () => {
            currentElement = parseInt(id);
            document.querySelectorAll('.element-grid button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        controls.appendChild(btn);
    });

    window.clearGrid = () => {
        for(let y=0; y<HEIGHT; y++) grid[y].fill(0);
        if (isOnline) pushToCloud();
    };

    let isDrawing = false;
    const handleInput = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = Math.floor((clientX - rect.left) / (rect.width / WIDTH));
        const y = Math.floor((clientY - rect.top) / (rect.height / HEIGHT));
        
        for(let i = -brushSize; i <= brushSize; i++) {
            for(let j = -brushSize; j <= brushSize; j++) {
                if(i*i + j*j > brushSize*brushSize) continue;
                const nx = x + i, ny = y + j;
                if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
                    grid[ny][nx] = currentElement;
                }
            }
        }
    };

    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => { if (isDrawing && isOnline) pushToCloud(); isDrawing = false; });
    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchend', () => { if (isDrawing && isOnline) pushToCloud(); isDrawing = false; });

    function loop() {
        updatePhysics();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
