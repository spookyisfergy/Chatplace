<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/genizy/google-class/nova-craft/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Craft - Multiplayer</title>
    
    <base href="https://cdn.jsdelivr.net/gh/genizy/google-class/nova-craft/">
    <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/genizy/google-class/nova-craft/assets/index-CQ1EvTOM.js"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/genizy/google-class/nova-craft/assets/index-CzvCHSYC.css">

    <style>
      /* Multiplayer HUD */
      #mp-hud {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        font-family: sans-serif;
        pointer-events: none;
      }

      #player-badge {
        background: rgba(0, 0, 0, 0.7);
        color: #4CAF50;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        border: 1px solid #4CAF50;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot { width: 8px; height: 8px; background: #4CAF50; border-radius: 50%; }

      /* Mini Game Star */
      #nova-star {
        position: fixed;
        width: 40px;
        height: 40px;
        background: radial-gradient(circle, #fff, #ff00ff);
        border-radius: 50%;
        box-shadow: 0 0 20px #ff00ff;
        cursor: pointer;
        z-index: 9999;
        display: none;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 20px #ff00ff; }
        50% { transform: scale(1.2); box-shadow: 0 0 40px #ff00ff; }
        100% { transform: scale(1); box-shadow: 0 0 20px #ff00ff; }
      }

      .supernova {
        position: fixed;
        width: 10px;
        height: 10px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 100px 50px white;
        z-index: 10001;
        pointer-events: none;
        animation: explode 0.5s ease-out forwards;
      }

      @keyframes explode {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(50); opacity: 0; }
      }

      /* Global Notification */
      #global-notify {
        position: fixed;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: #e090ff;
        padding: 8px 20px;
        border-radius: 5px;
        font-size: 14px;
        z-index: 10002;
        border: 1px solid #e090ff;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <div id="mp-hud">
      <div id="player-badge">
        <div class="dot"></div>
        <span id="player-info">Connecting...</span>
      </div>
    </div>

    <div id="global-notify"></div>
    <div id="nova-star"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
      import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD7THaNrq5OdU_b9GuU82AQsnyy_Eewey4",
        authDomain: "chatroon-4ded8.firebaseapp.com",
        databaseURL: "https://chatroon-4ded8-default-rtdb.firebaseio.com",
        projectId: "chatroon-4ded8",
        storageBucket: "chatroon-4ded8.firebasestorage.app",
        messagingSenderId: "779421378038",
        appId: "1:779421378038:web:2e4b804b316b23882f93d7"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      const playerInfo = document.getElementById('player-info');
      const notify = document.getElementById('global-notify');
      const star = document.getElementById('nova-star');

      function showNotification(text) {
        notify.innerText = text;
        notify.style.display = 'block';
        setTimeout(() => notify.style.display = 'none', 3000);
      }

      signInAnonymously(auth).then(({ user }) => {
        const userId = user.uid;
        const shortId = userId.substring(0, 4);
        
        // 1. Presence System
        const presenceRef = ref(db, `novacraft_v2/presence/${userId}`);
        const connectedRef = ref(db, '.info/connected');
        onValue(connectedRef, (snap) => {
          if (snap.val() === true) {
            set(presenceRef, true);
            onDisconnect(presenceRef).remove();
          }
        });

        onValue(ref(db, 'novacraft_v2/presence'), (snap) => {
          const count = snap.size || 0;
          playerInfo.innerText = `Player_${shortId} | ${count} Online`;
        });

        // 2. Collaborative Action Sync
        // We listen for mouse clicks on the body. If the user is interacting with the 
        // internal game elements, we broadcast that coordinate and action.
        const actionsRef = ref(db, 'novacraft_v2/actions');

        window.addEventListener('mousedown', (e) => {
          // We only sync if the click targets the game canvas or left sidebar
          // This allows users to "see" where others are clicking/placing
          push(actionsRef, {
            uid: shortId,
            x: e.clientX,
            y: e.clientY,
            type: 'interaction',
            timestamp: Date.now()
          });
        });

        // Visual feedback for other players' actions
        onChildAdded(actionsRef, (snapshot) => {
          const data = snapshot.val();
          if (data.uid === shortId) return; // Skip own clicks

          // Create a temporary ghost cursor to show where others are building
          const ghost = document.createElement('div');
          ghost.style.position = 'fixed';
          ghost.style.left = data.x + 'px';
          ghost.style.top = data.y + 'px';
          ghost.style.width = '10px';
          ghost.style.height = '10px';
          ghost.style.borderRadius = '50%';
          ghost.style.border = '2px solid rgba(0, 229, 255, 0.5)';
          ghost.style.pointerEvents = 'none';
          ghost.style.zIndex = '9999';
          ghost.style.transform = 'translate(-50%, -50%)';
          document.body.appendChild(ghost);

          ghost.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: 'translate(-50%, -50%) scale(3)', opacity: 0 }
          ], { duration: 1000, easing: 'ease-out' });

          setTimeout(() => ghost.remove(), 1000);
        });

        // 3. Mini-game Logic
        setInterval(() => {
          if (Math.random() > 0.8 && star.style.display === 'none') {
            star.style.display = 'block';
            star.style.left = (Math.random() * 80 + 10) + '%';
            star.style.top = (Math.random() * 80 + 10) + '%';
            setTimeout(() => star.style.display = 'none', 4000);
          }
        }, 10000);

        star.onclick = (e) => {
          star.style.display = 'none';
          
          const ex = document.createElement('div');
          ex.className = 'supernova';
          ex.style.left = e.clientX + 'px';
          ex.style.top = e.clientY + 'px';
          document.body.appendChild(ex);
          setTimeout(() => ex.remove(), 500);

          push(actionsRef, {
            uid: shortId,
            type: 'star_catch',
            timestamp: Date.now()
          });
          
          showNotification(`You captured the Nova Star!`);
        };

        // Listen for star catches by others
        onChildAdded(actionsRef, (snapshot) => {
          const data = snapshot.val();
          if (data.type === 'star_catch' && data.uid !== shortId) {
            showNotification(`Player_${data.uid} captured a Nova Star!`);
          }
        });

      });
    </script>
  </body>
</html>
