<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANDBOXELS ULTRA - PRO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --panel-bg: rgba(8, 8, 12, 0.98);
        }

        body {
            background: #010103;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas {
            image-rendering: pixelated;
            background: #000;
            cursor: crosshair;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: 1px solid #222;
        }

        .hud-panel {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            z-index: 100;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 300px;
            min-height: 400px;
        }

        .panel-header {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
            padding: 12px;
            cursor: move;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 6px;
            padding: 12px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .el-btn {
            aspect-ratio: 1;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.1s ease;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .el-btn:hover {
            border-color: var(--neon-blue);
            transform: scale(1.1);
            z-index: 10;
        }

        .el-btn.active {
            border-color: #fff;
            box-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.05);
        }

        .el-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: var(--neon-blue);
            padding: 4px 8px;
            font-size: 8px;
            font-weight: bold;
            border: 1px solid var(--neon-blue);
            border-radius: 2px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .el-btn:hover::after { opacity: 1; }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .category-tab {
            padding: 8px 4px;
            font-size: 8px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 700;
            color: #666;
            transition: all 0.2s;
            flex: 1;
            min-width: 60px;
        }

        .category-tab.active {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        #inspector {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 2px;
            font-size: 11px;
            pointer-events: none;
            letter-spacing: 2px;
            z-index: 200;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        #user-id-display {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 9px;
            color: #444;
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #222;
        }

        .admin-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 500;
            background: rgba(0,0,0,0.8);
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 8px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }

        .admin-trigger:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            transform: translateY(-2px);
        }

        .resizer {
            width: 15px;
            height: 15px;
            background: transparent;
            position: absolute;
            right: 0;
            bottom: 0;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 242, 255, 0.3) 50%);
            border-bottom-right-radius: 12px;
        }

        .element-grid::-webkit-scrollbar { width: 4px; }
        .element-grid::-webkit-scrollbar-track { background: transparent; }
        .element-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hud-panel" id="palette-win" style="top: 20px; left: 20px; width: 340px; height: 600px;">

            <span>UNIVERSE_CORE_v2</span>

                <button onclick="saveWorld()" class="py-2 bg-blue-950/20 border border-blue-900/40 text-blue-400 text-[9px] hover:bg-blue-600 hover:text-white transition-all font-bold uppercase tracking-widest">Snapshot</button>
            </div>

    <div id="inspector">INITIALIZING...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const WIDTH = 320;
        const HEIGHT = 240;

        const ELEMENTS = {
            EMPTY: { id: 0, color: '#000000', name: 'Air', cat: 'earth', icon: '◌' },
            BEDROCK: { id: 1, color: '#111111', name: 'Bedrock', cat: 'earth', state: 'solid', immovable: true, icon: '⬛' },
            SAND: { id: 2, color: '#e3b448', name: 'Sand', cat: 'earth', state: 'powder', density: 10, icon: '▒' },
            DIRT: { id: 3, color: '#5d4037', name: 'Dirt', cat: 'earth', state: 'powder', density: 9, icon: '🧱' },
            STONE: { id: 5, color: '#757575', name: 'Stone', cat: 'earth', state: 'solid', icon: '🪨' },
            GRAVEL: { id: 6, color: '#444444', name: 'Gravel', cat: 'earth', state: 'powder', density: 12, icon: '🔘' },
            SALT: { id: 7, color: '#f5f5f5', name: 'Salt', cat: 'earth', state: 'powder', density: 8, icon: '🧂' },
            ICE: { id: 9, color: '#a5f3fc', name: 'Ice', cat: 'earth', state: 'solid', icon: '🧊' },
            
            WATER: { id: 10, color: '#2196f3', name: 'Water', cat: 'liquid', state: 'liquid', density: 5, icon: '💧' },
            OIL: { id: 11, color: '#3e2723', name: 'Oil', cat: 'liquid', state: 'liquid', density: 4, icon: '🛢️' },
            ACID: { id: 12, color: '#cddc39', name: 'Acid', cat: 'liquid', state: 'liquid', density: 6, icon: '🧪' },
            LAVA: { id: 13, color: '#ff5722', name: 'Lava', cat: 'liquid', state: 'liquid', density: 15, temp: 1000, icon: '🔥' },
            MERCURY: { id: 14, color: '#b0bec5', name: 'Mercury', cat: 'liquid', state: 'liquid', density: 50, icon: '🌡️' },
            METHANE: { id: 15, color: '#80cbc4', name: 'Methane', cat: 'liquid', state: 'gas', density: 1, icon: '☁️' },
            LSD: { id: 16, color: '#ff00ff', name: 'LSD', cat: 'liquid', state: 'liquid', density: 5, icon: '🌈' },
            
            PLANT: { id: 20, color: '#4caf50', name: 'Plant', cat: 'life', state: 'solid', icon: '🌿' },
            SEED: { id: 21, color: '#8bc34a', name: 'Seed', cat: 'life', state: 'powder', icon: '🌱' },
            WOOD: { id: 23, color: '#795548', name: 'Wood', cat: 'life', state: 'solid', icon: '🪵' },
            MUSHROOM: { id: 27, color: '#ce93d8', name: 'Fungus', cat: 'life', state: 'solid', icon: '🍄' },
            HUMAN: { id: 60, color: '#ffcc80', name: 'Human', cat: 'life', state: 'living', density: 10, icon: '🧍' },
            ZOMBIE: { id: 61, color: '#33691e', name: 'Zombie', cat: 'life', state: 'living', icon: '🧟' },
            
            METAL: { id: 30, color: '#90a4ae', name: 'Steel', cat: 'tech', state: 'solid', conduct: true, icon: '⛓️' },
            WIRE: { id: 31, color: '#ff9800', name: 'Wire', cat: 'tech', state: 'solid', conduct: true, icon: '⚡' },
            BATTERY: { id: 36, color: '#d81b60', name: 'Battery', cat: 'tech', state: 'solid', source: true, icon: '🔋' },
            LED: { id: 37, color: '#444444', name: 'LED', cat: 'tech', state: 'solid', icon: '💡' },
            FAN: { id: 38, color: '#607d8b', name: 'Fan', cat: 'tech', state: 'solid', icon: '🌀' },
            
            FIRE: { id: 24, color: '#f44336', name: 'Fire', cat: 'energy', state: 'gas', temp: 500, icon: '♨️' },
            STEAM: { id: 25, color: '#cfd8dc', name: 'Steam', cat: 'energy', state: 'gas', icon: '💨' },
            TNT: { id: 40, color: '#b71c1c', name: 'TNT', cat: 'energy', state: 'solid', icon: '🧨' },
            C4: { id: 42, color: '#455a64', name: 'C4', cat: 'energy', state: 'solid', icon: '💣' },
            SPARK: { id: 32, color: '#00bcd4', name: 'Spark', cat: 'energy', state: 'energy', icon: '✨' },
            
            VOID: { id: 50, color: '#1a0033', name: 'Void', cat: 'special', state: 'special', icon: '🕳️' },
            WALL: { id: 52, color: '#ffffff', name: 'Indestructible', cat: 'special', state: 'solid', immovable: true, icon: '💎' },
            ERASER: { id: 53, color: '#000000', name: 'Eraser', cat: 'special', icon: '✖️' },
            CLOUD: { id: 54, color: '#eceff1', name: 'Cloud', cat: 'special', state: 'gas', icon: '☁️' },
        };

        let grid = new Int32Array(WIDTH * HEIGHT);
        let gridExtra = new Int8Array(WIDTH * HEIGHT);
        let gridTrip = new Uint8Array(WIDTH * HEIGHT);
        
        let selectedElement = 2; 
        let brushSize = 8;
        let isMouseDown = false;
        let user = null;
        let frameCount = 0;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sandboxels-ultra-pro';

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch(e) {}

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('user-id-display').innerText = `ID: ${user.uid}`;
                    document.getElementById('status-light').className = "w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_8px_#00f2ff]";
                    setupMultiplayer();
                }
            });

            buildBedrock();
            buildUI();
            setupPanelInteraction();
            loop();
        }

        function buildBedrock() {
            for(let y = HEIGHT - 8; y < HEIGHT; y++) {
                for(let x = 0; x < WIDTH; x++) {
                    grid[y * WIDTH + x] = ELEMENTS.BEDROCK.id;
                }
            }
        }

        function buildUI() {
            const list = document.getElementById('element-list');
            const tabs = document.getElementById('tabs');
            
            function renderCategory(cat) {
                list.innerHTML = '';
                Object.values(ELEMENTS).forEach(el => {
                    if(el.cat !== cat) return;
                    const btn = document.createElement('div');
                    btn.className = `el-btn ${selectedElement === el.id ? 'active' : ''}`;
                    btn.style.background = el.id === 0 ? 'transparent' : el.color;
                    btn.dataset.tooltip = el.name.toUpperCase();
                    btn.innerHTML = el.icon;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        selectedElement = el.id;
                        document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    list.appendChild(btn);
                });
            }

            tabs.onclick = (e) => {
                if(e.target.dataset.cat) {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    renderCategory(e.target.dataset.cat);
                }
            };
            renderCategory('earth');
        }

        function setupPanelInteraction() {
            const panel = document.getElementById('palette-win');
            const header = panel.querySelector('.panel-header');
            const resizer = document.getElementById('panel-resizer');

            header.onmousedown = (e) => {
                let shiftX = e.clientX - panel.getBoundingClientRect().left;
                let shiftY = e.clientY - panel.getBoundingClientRect().top;
                function onMouseMove(e) {
                    panel.style.left = e.pageX - shiftX + 'px';
                    panel.style.top = e.pageY - shiftY + 'px';
                }
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            resizer.onmousedown = (e) => {
                e.stopPropagation();
                e.preventDefault();
                const startWidth = panel.offsetWidth, startHeight = panel.offsetHeight;
                const startX = e.clientX, startY = e.clientY;
                function doResize(e) {
                    panel.style.width = (startWidth + e.clientX - startX) + 'px';
                    panel.style.height = (startHeight + e.clientY - startY) + 'px';
                }
                function stopResize() {
                    document.removeEventListener('mousemove', doResize);
                    document.removeEventListener('mouseup', stopResize);
                }
                document.addEventListener('mousemove', doResize);
                document.addEventListener('mouseup', stopResize);
            };
        }

        function getPixel(x, y) {
            if (x < 0 || x >= WIDTH || y < 0 || y >= HEIGHT) return -1;
            return grid[y * WIDTH + x];
        }

        function setPixel(x, y, val) {
            if (x < 0 || x >= WIDTH || y < 0 || y >= HEIGHT) return;
            if (grid[y * WIDTH + x] === ELEMENTS.BEDROCK.id || grid[y * WIDTH + x] === ELEMENTS.WALL.id) return;
            grid[y * WIDTH + x] = val;
            gridExtra[y * WIDTH + x] = 0;
            gridTrip[y * WIDTH + x] = 0;
        }

        function update() {
            frameCount++;
            for (let y = HEIGHT - 1; y >= 0; y--) {
                const xOffset = Math.floor(Math.random() * WIDTH);
                for (let i = 0; i < WIDTH; i++) {
                    const x = (i + xOffset) % WIDTH;
                    const idx = y * WIDTH + x;
                    const p = grid[idx];
                    if (p === 0) continue;

                    const el = Object.values(ELEMENTS).find(e => e.id === p);
                    if (!el || el.immovable) continue;

                    let trippy = gridTrip[idx] > 0;

                    if (el.state === 'powder') {
                        let dy = 1;
                        if (trippy && Math.random() > 0.8) dy = -1;
                        const below = getPixel(x, y + dy);
                        if (below === 0) {
                            grid[idx] = 0; grid[(y + dy) * WIDTH + x] = p;
                            gridTrip[(y + dy) * WIDTH + x] = gridTrip[idx];
                            gridTrip[idx] = 0;
                        } else {
                            const belowEl = Object.values(ELEMENTS).find(e => e.id === below);
                            if (belowEl && belowEl.state === 'liquid' && (belowEl.density || 5) < (el.density || 10)) {
                                grid[idx] = below; grid[(y+dy)*WIDTH+x] = p;
                                gridTrip[(y+dy)*WIDTH+x] = gridTrip[idx];
                                gridTrip[idx] = 0;
                            } else {
                                const dir = Math.random() < 0.5 ? -1 : 1;
                                if (getPixel(x + dir, y + dy) === 0) {
                                    grid[idx] = 0; grid[(y + dy) * WIDTH + (x + dir)] = p;
                                    gridTrip[(y+dy)*WIDTH+(x+dir)] = gridTrip[idx];
                                    gridTrip[idx] = 0;
                                }
                            }
                        }
                    } else if (el.state === 'liquid') {
                        let dy = 1;
                        if (trippy && Math.random() > 0.9) dy = 0;
                        if (getPixel(x, y + dy) === 0) {
                            grid[idx] = 0; grid[(y + dy) * WIDTH + x] = p;
                            gridTrip[(y+dy)*WIDTH+x] = gridTrip[idx];
                            gridTrip[idx] = 0;
                        } else {
                            const dir = Math.random() < 0.5 ? -1 : 1;
                            if (getPixel(x + dir, y + dy) === 0) {
                                grid[idx] = 0; grid[(y + dy) * WIDTH + (x + dir)] = p;
                                gridTrip[(y+dy)*WIDTH+(x+dir)] = gridTrip[idx];
                                gridTrip[idx] = 0;
                            } else if (getPixel(x + dir, y) === 0) {
                                grid[idx] = 0; grid[y * WIDTH + (x + dir)] = p;
                                gridTrip[y*WIDTH+(x+dir)] = gridTrip[idx];
                                gridTrip[idx] = 0;
                            }
                        }
                    } else if (el.state === 'gas' || p === ELEMENTS.CLOUD.id) {
                        const dx = Math.floor(Math.random() * 3) - 1;
                        const dy = Math.random() < 0.8 ? -1 : 0;
                        if (getPixel(x + dx, y + dy) === 0) {
                            grid[idx] = 0; grid[(y + dy) * WIDTH + (x + dx)] = p;
                        }
                        if (p === ELEMENTS.CLOUD.id && Math.random() > 0.99) {
                            if (getPixel(x, y + 1) === 0) grid[(y+1)*WIDTH+x] = ELEMENTS.WATER.id;
                        }
                    } else if (el.state === 'living') {
                        const dir = Math.random() < 0.5 ? -1 : 1;
                        const below = getPixel(x, y + 1);
                        if (below === 0) {
                            grid[idx] = 0; grid[(y + 1) * WIDTH + x] = p;
                            gridTrip[(y+1)*WIDTH+x] = gridTrip[idx];
                            gridTrip[idx] = 0;
                        } else if (getPixel(x + dir, y) === 0) {
                            if (Math.random() > (trippy ? 0.3 : 0.7)) {
                                grid[idx] = 0; grid[y * WIDTH + (x + dir)] = p;
                                gridTrip[y*WIDTH+(x+dir)] = gridTrip[idx];
                                gridTrip[idx] = 0;
                            }
                        }
                        if (p === ELEMENTS.ZOMBIE.id) {
                            const neighbors = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
                            neighbors.forEach(([nx, ny]) => {
                                if (getPixel(nx, ny) === ELEMENTS.HUMAN.id) grid[ny*WIDTH+nx] = ELEMENTS.ZOMBIE.id;
                            });
                        }
                    }

                    if (p === ELEMENTS.LSD.id) {
                        const neighbors = [[x,y-1],[x,y+1],[x-1,y],[x+1,y]];
                        neighbors.forEach(([nx, ny]) => {
                            const t = getPixel(nx, ny);
                            if (t > 0 && t !== ELEMENTS.BEDROCK.id && t !== ELEMENTS.WALL.id) {
                                gridTrip[ny*WIDTH+nx] = 255;
                            }
                        });
                    }

                    if (p === ELEMENTS.FIRE.id) {
                        const neighbors = [[x,y-1],[x,y+1],[x-1,y],[x+1,y]];
                        neighbors.forEach(([nx, ny]) => {
                            const t = getPixel(nx, ny);
                            if ([ELEMENTS.PLANT.id, ELEMENTS.WOOD.id, ELEMENTS.OIL.id, ELEMENTS.HUMAN.id].includes(t)) {
                                grid[ny*WIDTH+nx] = ELEMENTS.FIRE.id;
                            } else if (t === ELEMENTS.WATER.id) {
                                grid[ny*WIDTH+nx] = ELEMENTS.STEAM.id;
                                grid[idx] = 0;
                            } else if (t === ELEMENTS.TNT.id) explode(nx, ny, 20);
                        });
                        if (Math.random() > 0.9) grid[idx] = 0;
                    }

                    if (p === ELEMENTS.VOID.id) {
                        const neighbors = [[x,y-1],[x,y+1],[x-1,y],[x+1,y]];
                        neighbors.forEach(([nx, ny]) => {
                            const t = getPixel(nx, ny);
                            if (t > 0 && t !== ELEMENTS.WALL.id) grid[ny*WIDTH+nx] = 0;
                        });
                    }

                    if (p === ELEMENTS.SPARK.id) {
                        const neighbors = [[x,y-1],[x,y+1],[x-1,y],[x+1,y]];
                        neighbors.forEach(([nx, ny]) => {
                            const t = getPixel(nx, ny);
                            if (t === ELEMENTS.TNT.id || t === ELEMENTS.C4.id) explode(nx, ny, 30);
                            else if (t === ELEMENTS.WIRE.id || t === ELEMENTS.METAL.id) {
                                if (Math.random() > 0.5) grid[ny*WIDTH+nx] = ELEMENTS.SPARK.id;
                            }
                        });
                        grid[idx] = 0;
                    }
                    if (gridTrip[idx] > 0 && Math.random() > 0.99) gridTrip[idx]--;
                }
            }
        }

        function explode(x, y, radius) {
            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    if (i*i + j*j > radius*radius) continue;
                    const nx = x + i, ny = y + j;
                    const t = getPixel(nx, ny);
                    if (t !== -1 && t !== ELEMENTS.WALL.id) {
                        grid[ny*WIDTH + nx] = Math.random() > 0.8 ? ELEMENTS.FIRE.id : 0;
                    }
                }
            }
        }

        const imgData = ctx.createImageData(WIDTH, HEIGHT);
        function draw() {
            for (let i = 0; i < grid.length; i++) {
                const elId = grid[i];
                const el = Object.values(ELEMENTS).find(e => e.id === elId) || ELEMENTS.EMPTY;
                const idx = i * 4;
                let rgb = hexToRgb(el.color);
                if (gridTrip[i] > 0) {
                    const phase = (frameCount * 0.2) + (i * 0.05);
                    rgb.r = Math.sin(phase) * 127 + 128;
                    rgb.g = Math.sin(phase + 2) * 127 + 128;
                    rgb.b = Math.sin(phase + 4) * 127 + 128;
                }
                imgData.data[idx] = rgb.r;
                imgData.data[idx+1] = rgb.g;
                imgData.data[idx+2] = rgb.b;
                imgData.data[idx+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        }

        function setupMultiplayer() {
            if (!user) return;
            const strokesRef = collection(db, 'artifacts', appId, 'public', 'data', 'strokes');
            onSnapshot(strokesRef, (snap) => {
                snap.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        if (d.userId !== user.uid) paint(d.x, d.y, d.type, d.size, false);
                    }
                });
            }, (err) => {});
        }

        window.saveWorld = async () => {
            if (!user) return;
            const stateDoc = doc(db, 'artifacts', appId, 'public', 'data', 'world', 'current');
            const flatGrid = Array.from(grid).join(',');
            await setDoc(stateDoc, { data: flatGrid, ts: serverTimestamp() });
        }

        async function paint(x, y, type, size, sync = true) {
            if (type === 53) type = 0;
            for (let i = -size; i <= size; i++) {
                for (let j = -size; j <= size; j++) {
                    if (i*i + j*j > size*size) continue;
                    setPixel(Math.floor(x + i), Math.floor(y + j), type);
                    if (type === ELEMENTS.LSD.id) {
                        const targetIdx = Math.floor(y+j) * WIDTH + Math.floor(x+i);
                        if (targetIdx >= 0 && targetIdx < gridTrip.length) gridTrip[targetIdx] = 255;
                    }
                }
            }
            if(sync && user && Math.random() > 0.9) {
                try {
                    addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'strokes'), {
                        x, y, type, size, userId: user.uid, ts: serverTimestamp()
                    });
                } catch (e) {}
            }
        }

        function handlePointer(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) * (WIDTH / rect.width);
            const y = (clientY - rect.top) * (HEIGHT / rect.height);
            const brushCircle = document.getElementById('brush-circle');
            brushCircle.style.left = clientX + 'px';
            brushCircle.style.top = clientY + 'px';
            brushCircle.style.width = (brushSize * (rect.width/WIDTH) * 2) + 'px';
            brushCircle.style.height = (brushSize * (rect.width/WIDTH) * 2) + 'px';
            if (isMouseDown) paint(x, y, selectedElement, brushSize);
            const hoveredId = getPixel(Math.floor(x), Math.floor(y));
            const el = Object.values(ELEMENTS).find(e => e.id === hoveredId);
            if(el) {
                document.getElementById('inspector').innerHTML = `<span style="color:white">LINK:</span> ${el.name.toUpperCase()} <span style="color:white; opacity:0.3">[${Math.floor(x)},${Math.floor(y)}]</span>`;
            }
        }

        window.addEventListener('mousedown', (e) => { if(e.target.closest('.hud-panel') || e.target.closest('.admin-trigger')) return; isMouseDown = true; });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', handlePointer);
        window.addEventListener('touchstart', (e) => { if(e.target.closest('.hud-panel') || e.target.closest('.admin-trigger')) return; isMouseDown = true; handlePointer(e); });
        window.addEventListener('touchend', () => isMouseDown = false);
        window.addEventListener('touchmove', (e) => { if(e.target.closest('.hud-panel') || e.target.closest('.admin-trigger')) return; e.preventDefault(); handlePointer(e); }, {passive: false});

        document.getElementById('brush-size').oninput = (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('brush-size-val').innerText = brushSize + 'px';
        };

        window.clearSim = () => { grid.fill(0); gridTrip.fill(0); buildBedrock(); };
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init();
    </script>
</body>
</html>
