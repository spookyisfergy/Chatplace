<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATABEND // circuit-bent camera</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Anton&display=swap');
  :root{
    --bg:#0a0510;
    --ink:#e8fff4;
    --hot:#ff2f6d;      /* magenta glitch */
    --acid:#c6ff2e;     /* acid green */
    --cyan:#25f0e0;     /* teal */
    --violet:#7b2fff;
    --panel:rgba(20,8,34,.72);
    --line:rgba(198,255,46,.22);
    --mono:'DM Mono','Courier New',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--mono);
    overflow:hidden;
    -webkit-font-smoothing:none;
  }
  /* scanline / crt overlay on whole page */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }

  #stage{position:fixed;inset:0}
  canvas#out{width:100%;height:100%;display:block;image-rendering:pixelated}
  video#cam,canvas#work{display:none}

  /* ---- top title bar ---- */
  .bar{
    position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:baseline;gap:14px;
    padding:12px 18px;
    background:linear-gradient(180deg,rgba(10,5,16,.85),transparent);
    pointer-events:none;
  }
  .logo{
    font-family:'Anton',sans-serif;font-size:26px;letter-spacing:2px;
    color:var(--ink);text-transform:uppercase;line-height:1;
    text-shadow:2px 0 var(--hot),-2px 0 var(--cyan);
    animation:jit 4s steps(1) infinite;
  }
  @keyframes jit{
    0%,92%{transform:translate(0,0)}
    93%{transform:translate(-2px,1px)}
    95%{transform:translate(2px,-1px)}
    97%{transform:translate(-1px,0)}
    100%{transform:translate(0,0)}
  }
  .sub{font-size:11px;color:var(--acid);letter-spacing:3px;opacity:.8}
  .rec{margin-left:auto;font-size:11px;color:var(--hot);letter-spacing:2px;pointer-events:none;display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:#333;box-shadow:0 0 0 1px #000}
  .dot.live{background:var(--hot);box-shadow:0 0 8px var(--hot)}

  /* ---- left effect rack ---- */
  .rack{
    position:fixed;top:64px;left:14px;z-index:20;width:210px;
    background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(6px);
    box-shadow:0 0 0 1px rgba(0,0,0,.6), 6px 6px 0 rgba(0,0,0,.35);
  }
  .rack h2{
    font-size:11px;letter-spacing:3px;color:var(--acid);
    padding:9px 11px;border-bottom:1px solid var(--line);text-transform:uppercase;
  }
  .fx{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:9px}
  .fx button{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;
    color:var(--ink);background:rgba(123,47,255,.14);
    border:1px solid rgba(198,255,46,.28);padding:8px 5px;
    cursor:pointer;text-transform:uppercase;text-align:left;line-height:1.25;
    transition:transform .05s, background .12s;
  }
  .fx button:hover{background:rgba(198,255,46,.16)}
  .fx button.on{
    background:var(--acid);color:#0a0510;border-color:var(--acid);
    box-shadow:0 0 12px rgba(198,255,46,.5);
  }
  .fx button:active{transform:translate(1px,1px)}

  /* ---- bottom control deck ---- */
  .deck{
    position:fixed;left:14px;right:14px;bottom:14px;z-index:20;
    display:flex;flex-wrap:wrap;align-items:center;gap:14px;
    background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(6px);padding:12px 16px;
    box-shadow:6px 6px 0 rgba(0,0,0,.35);
  }
  .grp{display:flex;align-items:center;gap:9px}
  .grp .lab{font-size:10px;letter-spacing:2px;color:var(--acid);text-transform:uppercase}
  button.ctl{
    font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:#0a0510;background:var(--cyan);border:none;padding:9px 13px;cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.5);transition:transform .05s;
  }
  button.ctl.alt{background:var(--hot);color:#fff}
  button.ctl.violet{background:var(--violet);color:#fff}
  button.ctl:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5)}
  button.ctl:disabled{opacity:.35;cursor:not-allowed}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:110px;height:4px;
    background:rgba(198,255,46,.3);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;background:var(--acid);
    border:1px solid #0a0510;box-shadow:0 0 8px var(--acid);cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:14px;height:14px;background:var(--acid);border:1px solid #0a0510;cursor:pointer;
  }
  .meter{display:flex;gap:2px;align-items:flex-end;height:22px;width:74px}
  .meter i{flex:1;background:var(--violet);height:10%;transition:height .05s}

  .file{position:relative;overflow:hidden}
  .file input{position:absolute;inset:0;opacity:0;cursor:pointer}

  /* ---- boot / help toast ---- */
  .hint{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;
    text-align:center;max-width:440px;pointer-events:none;
  }
  .hint .k{
    font-family:'Anton',sans-serif;font-size:42px;letter-spacing:2px;
    color:var(--ink);text-shadow:3px 0 var(--hot),-3px 0 var(--cyan);
  }
  .hint p{font-size:12px;color:var(--acid);letter-spacing:1.5px;margin-top:12px;line-height:1.9}
  .hint span{color:var(--ink)}

  @media (max-width:640px){
    .rack{width:150px}
    .deck{gap:9px;padding:9px}
    input[type=range]{width:70px}
    .logo{font-size:20px}
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="out"></canvas>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="work"></canvas>
</div>

<div class="bar">
  <div class="logo">DATABEND</div>
  <div class="sub">CIRCUIT-BENT CAM</div>
  <div class="rec"><span class="dot" id="dot"></span><span id="recTxt">SIGNAL: NONE</span></div>
</div>

<div class="rack">
  <h2>Effect Rack</h2>
  <div class="fx" id="fxRack"></div>
</div>

<div class="hint" id="hint">
  <div class="k">NO SIGNAL</div>
  <p>
    <span>1.</span> hit <span>[ CAM ]</span> to feed the sensor<br>
    <span>2.</span> load a track or use <span>[ MIC ]</span><br>
    <span>3.</span> stack effects &mdash; they bend to the beat
  </p>
</div>

<div class="deck">
  <div class="grp">
    <button class="ctl violet" id="camBtn">◉ Cam</button>
    <button class="ctl" id="micBtn">≋ Mic</button>
    <span class="file"><button class="ctl alt" id="fileBtn">♫ Load Track</button><input type="file" id="audioFile" accept="audio/*"></span>
    <button class="ctl" id="playBtn" disabled>▶ Play</button>
  </div>
  <div class="grp">
    <span class="lab">Reactivity</span>
    <input type="range" id="react" min="0" max="200" value="100">
  </div>
  <div class="grp">
    <span class="lab">Intensity</span>
    <input type="range" id="intensity" min="0" max="200" value="100">
  </div>
  <div class="grp">
    <span class="lab">Level</span>
    <div class="meter" id="meter"></div>
  </div>
  <div class="grp" style="margin-left:auto">
    <button class="ctl violet" id="snap">▣ Snapshot</button>
    <button class="ctl alt" id="freeze">❄ Freeze</button>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ============================================================
   DATABEND — circuit-bent audio-reactive camera
   Single-file. Pure canvas pixel manipulation.
   ============================================================ */
const video   = document.getElementById('cam');
const work    = document.getElementById('work');
const wctx    = work.getContext('2d',{willReadFrequently:true});
const out     = document.getElementById('out');
const octx    = out.getContext('2d');
const audioEl = document.getElementById('audio');

// ---- audio analysis ----
let AC, analyser, srcNode, micStream, freqData, timeData;
let bass=0, mid=0, treble=0, level=0, beat=0, lastBeat=0, energyHist=[];

function ensureAudioCtx(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    analyser = AC.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.75;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
  }
  if(AC.state==='suspended') AC.resume();
}

function connectFileAudio(){
  ensureAudioCtx();
  if(srcNode) try{srcNode.disconnect()}catch(e){}
  srcNode = AC.createMediaElementSource(audioEl);
  srcNode.connect(analyser);
  analyser.connect(AC.destination);
  setSignal('TRACK');
}

async function startMic(){
  ensureAudioCtx();
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    if(srcNode) try{srcNode.disconnect()}catch(e){}
    srcNode = AC.createMediaStreamSource(micStream);
    srcNode.connect(analyser); // do NOT route mic to destination (feedback)
    setSignal('MIC');
    audioEl.pause();
    playBtn.disabled = true;
  }catch(e){ alert('Mic access denied.'); }
}

function analyze(){
  if(!analyser){bass=mid=treble=level=beat=0;return;}
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const n = freqData.length;
  let b=0,m=0,t=0;
  const bEnd=Math.floor(n*0.10), mEnd=Math.floor(n*0.45);
  for(let i=0;i<n;i++){
    const v=freqData[i];
    if(i<bEnd) b+=v; else if(i<mEnd) m+=v; else t+=v;
  }
  bass   = b/(bEnd*255);
  mid    = m/((mEnd-bEnd)*255);
  treble = t/((n-mEnd)*255);
  // rms level from waveform
  let s=0; for(let i=0;i<timeData.length;i++){const d=(timeData[i]-128)/128;s+=d*d;}
  level = Math.sqrt(s/timeData.length);
  // simple beat detect on bass energy
  energyHist.push(bass);
  if(energyHist.length>43) energyHist.shift();
  const avg = energyHist.reduce((a,c)=>a+c,0)/energyHist.length;
  const now = performance.now();
  if(bass>avg*1.35 && bass>0.25 && now-lastBeat>180){ beat=1; lastBeat=now; }
  else beat = Math.max(0, beat-0.06);
}

// ---- signal indicator ----
const dot=document.getElementById('dot'), recTxt=document.getElementById('recTxt');
function setSignal(name){
  dot.classList.add('live'); recTxt.textContent='SIGNAL: '+name;
}

// ---- camera ----
let camOn=false;
document.getElementById('camBtn').addEventListener('click', async ()=>{
  if(camOn){ // toggle off
    if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
    camOn=false; document.getElementById('camBtn').textContent='◉ Cam';
    hint.style.display='block';
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'}});
    video.srcObject = stream;
    await video.play();
    camOn=true;
    document.getElementById('camBtn').textContent='◉ Cam ON';
    hint.style.display='none';
    sizeCanvas();
  }catch(e){ alert('Camera access denied or unavailable.'); }
});

// ---- audio controls ----
const playBtn=document.getElementById('playBtn');
document.getElementById('fileBtn'); // label wrapper only
document.getElementById('audioFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  audioEl.src = URL.createObjectURL(f);
  connectFileAudio();
  playBtn.disabled=false;
  playBtn.textContent='▶ Play';
});
playBtn.addEventListener('click', ()=>{
  ensureAudioCtx();
  if(audioEl.paused){ audioEl.play(); playBtn.textContent='❚❚ Pause'; }
  else { audioEl.pause(); playBtn.textContent='▶ Play'; }
});
document.getElementById('micBtn').addEventListener('click', startMic);

// ---- sliders ----
const reactEl=document.getElementById('react');
const intensEl=document.getElementById('intensity');
const reactAmt=()=>reactEl.value/100;
const intensAmt=()=>intensEl.value/100;

// ---- effect rack ----
const EFFECTS = [
  {id:'rgbsplit', name:'RGB Split'},
  {id:'datamosh', name:'Datamosh'},
  {id:'scanbend', name:'Scan Bend'},
  {id:'pixelsort',name:'Pixel Sort'},
  {id:'chromashift',name:'Chroma Wave'},
  {id:'echo',     name:'Ghost Echo'},
  {id:'invert',   name:'Bit Crush'},
  {id:'slice',    name:'Slice Glitch'},
  {id:'kaleido',  name:'Kaleido'},
  {id:'posterize',name:'Posterize'},
  {id:'wobble',   name:'Wobble'},
  {id:'noise',    name:'Static Burst'},
];
const active = new Set(['rgbsplit','scanbend']);
const rack=document.getElementById('fxRack');
EFFECTS.forEach(fx=>{
  const b=document.createElement('button');
  b.textContent=fx.name; b.dataset.id=fx.id;
  if(active.has(fx.id)) b.classList.add('on');
  b.addEventListener('click',()=>{
    if(active.has(fx.id)){active.delete(fx.id);b.classList.remove('on');}
    else{active.add(fx.id);b.classList.add('on');}
  });
  rack.appendChild(b);
});

// ---- meter ----
const meter=document.getElementById('meter');
const bars=[]; for(let i=0;i<10;i++){const el=document.createElement('i');meter.appendChild(el);bars.push(el);}

// ---- freeze / snapshot ----
let frozen=false;
document.getElementById('freeze').addEventListener('click',e=>{
  frozen=!frozen; e.target.textContent = frozen?'▶ Unfreeze':'❄ Freeze';
});
document.getElementById('snap').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.download='databend_'+Date.now()+'.png';
  a.href=out.toDataURL('image/png'); a.click();
});
const hint=document.getElementById('hint');

// ---- sizing ----
let W=0,H=0, DS=1; // downsample factor for the work buffer (keeps effects fast + chunky)
function sizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  out.width = Math.floor(out.clientWidth*dpr);
  out.height= Math.floor(out.clientHeight*dpr);
  // work buffer runs at a lower res for that lo-fi bent look
  const vw = video.videoWidth||1280, vh=video.videoHeight||720;
  const targetW = 480;
  DS = vw>targetW ? targetW/vw : 1;
  work.width = Math.max(2,Math.floor(vw*DS));
  work.height= Math.max(2,Math.floor(vh*DS));
  W=work.width; H=work.height;
}
window.addEventListener('resize',sizeCanvas);

// ============================================================
//  EFFECT IMPLEMENTATIONS  (operate on ImageData)
// ============================================================
let echoBuf=null, feedbackBuf=null, t=0;

function fxRGBSplit(src,dst){
  const amt = (3 + bass*22*reactAmt()) * intensAmt() | 0;
  const w=W,h=H,s=src.data,d=dst.data;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const rx=Math.min(w-1,x+amt), bx=Math.max(0,x-amt);
      d[i]  = s[(y*w+rx)*4];       // R shifted right
      d[i+1]= s[i+1];              // G stays
      d[i+2]= s[(y*w+bx)*4+2];     // B shifted left
      d[i+3]=255;
    }
  }
}

function fxScanBend(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  const amp = (6 + mid*40*reactAmt())*intensAmt();
  for(let y=0;y<h;y++){
    const off = Math.round(Math.sin(y*0.15 + t*0.08)*amp*(0.4+bass));
    for(let x=0;x<w;x++){
      let sx=x+off; if(sx<0)sx+=w; if(sx>=w)sx-=w;
      const i=(y*w+x)*4, j=(y*w+sx)*4;
      d[i]=s[j];d[i+1]=s[j+1];d[i+2]=s[j+2];d[i+3]=255;
    }
  }
}

function fxSlice(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  d.set(s);
  const slices = 3 + Math.floor((bass+treble)*8*reactAmt());
  for(let n=0;n<slices;n++){
    if(Math.random()>0.5+ -intensAmt()*0.2) continue;
    const sy=Math.floor(Math.random()*h);
    const sh=1+Math.floor(Math.random()*h*0.12);
    const shift=Math.floor((Math.random()*2-1)*w*0.5*intensAmt()*(0.3+bass));
    for(let y=sy;y<Math.min(h,sy+sh);y++){
      for(let x=0;x<w;x++){
        let sx=x+shift; if(sx<0)sx+=w; if(sx>=w)sx-=w;
        const i=(y*w+x)*4, j=(y*w+sx)*4;
        d[i]=s[j];d[i+1]=s[j+1];d[i+2]=s[j+2];
      }
    }
  }
}

function fxDatamosh(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  if(!feedbackBuf||feedbackBuf.length!==s.length){feedbackBuf=new Uint8ClampedArray(s); }
  const push = (bass*0.85+level)*reactAmt();
  const block=6;
  for(let y=0;y<h;y+=block){
    for(let x=0;x<w;x+=block){
      const motion = (Math.sin((x+y)*0.05+t*0.1)*push*14)|0;
      for(let by=0;by<block&&y+by<h;by++){
        for(let bx=0;bx<block&&x+bx<w;bx++){
          const px=x+bx, py=y+by;
          let mx=px+motion; if(mx<0)mx=0; if(mx>=w)mx=w-1;
          const i=(py*w+px)*4, j=(py*w+mx)*4;
          // blend fresh frame with previous (mosh smear)
          d[i]  = s[j]*0.55 + feedbackBuf[i]*0.45;
          d[i+1]= s[j+1]*0.55 + feedbackBuf[i+1]*0.45;
          d[i+2]= s[j+2]*0.55 + feedbackBuf[i+2]*0.45;
          d[i+3]=255;
        }
      }
    }
  }
  feedbackBuf.set(d);
}

function fxPixelSort(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  d.set(s);
  const thresh = 120 - treble*90*reactAmt();
  const doRows = Math.random()<0.5;
  const stripe = Math.max(1, Math.floor(h*(0.3-intensAmt()*0.15)));
  for(let y=0;y<h;y+=1){
    if(y%3!==0) continue;
    let x=0;
    while(x<w){
      // find span of pixels above brightness threshold
      let start=x;
      while(x<w){
        const i=(y*w+x)*4;
        const b=(d[i]+d[i+1]+d[i+2])/3;
        if(b<thresh) break; x++;
      }
      const span=[];
      for(let k=start;k<x;k++){const i=(y*w+k)*4;span.push([d[i],d[i+1],d[i+2]]);}
      span.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));
      for(let k=start;k<x;k++){const i=(y*w+k)*4,c=span[k-start];d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];}
      x++;
    }
  }
}

function fxChroma(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  const shift = (treble*180*reactAmt())*intensAmt();
  for(let i=0;i<s.length;i+=4){
    const r=s[i],g=s[i+1],b=s[i+2];
    // rotate hue cheaply by channel rolling based on brightness+shift
    const k=((r+g+b)/3 + shift + t*2)%360;
    const f=k/60;
    if(f<1){d[i]=r; d[i+1]=g*0.6+b*0.4; d[i+2]=b;}
    else if(f<2){d[i]=g; d[i+1]=r; d[i+2]=b;}
    else if(f<3){d[i]=b; d[i+1]=g; d[i+2]=r;}
    else if(f<4){d[i]=r; d[i+1]=b; d[i+2]=g;}
    else{d[i]=g; d[i+1]=b; d[i+2]=r;}
    d[i+3]=255;
  }
}

function fxEcho(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  if(!echoBuf||echoBuf.length!==s.length) echoBuf=new Uint8ClampedArray(s);
  const decay = 0.6 + bass*0.35*reactAmt();
  for(let i=0;i<s.length;i+=4){
    d[i]  = Math.max(s[i],   echoBuf[i]*decay);
    d[i+1]= Math.max(s[i+1], echoBuf[i+1]*decay);
    d[i+2]= Math.max(s[i+2], echoBuf[i+2]*decay);
    d[i+3]=255;
  }
  echoBuf.set(d);
}

function fxInvert(src,dst){ // bit crush + conditional invert on beat
  const w=W,h=H,s=src.data,d=dst.data;
  const levels = Math.max(2, 8 - Math.floor((bass)*6*reactAmt()*intensAmt()));
  const step=255/(levels-1);
  const inv = beat>0.5;
  for(let i=0;i<s.length;i+=4){
    let r=Math.round(s[i]/step)*step;
    let g=Math.round(s[i+1]/step)*step;
    let b=Math.round(s[i+2]/step)*step;
    if(inv){r=255-r;g=255-g;b=255-b;}
    d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
  }
}

function fxKaleido(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  const cx=w/2, cy=h/2;
  const seg = 3 + Math.floor(mid*6*reactAmt());
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let dx=x-cx, dy=y-cy;
      let ang=Math.atan2(dy,dx), rad=Math.hypot(dx,dy);
      const slice=Math.PI*2/seg;
      ang=Math.abs(((ang%slice)+slice)%slice - slice/2) + t*0.01*reactAmt();
      let sx=Math.round(cx+Math.cos(ang)*rad);
      let sy=Math.round(cy+Math.sin(ang)*rad);
      sx=Math.max(0,Math.min(w-1,sx)); sy=Math.max(0,Math.min(h-1,sy));
      const i=(y*w+x)*4, j=(sy*w+sx)*4;
      d[i]=s[j];d[i+1]=s[j+1];d[i+2]=s[j+2];d[i+3]=255;
    }
  }
}

function fxPosterize(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  const lv=Math.max(2,Math.round(6-treble*4*reactAmt()));
  const step=255/(lv-1);
  for(let i=0;i<s.length;i+=4){
    d[i]=Math.round(s[i]/step)*step;
    d[i+1]=Math.round(s[i+1]/step)*step;
    d[i+2]=Math.round(s[i+2]/step)*step;
    d[i+3]=255;
  }
}

function fxWobble(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  const ax=(4+bass*24*reactAmt())*intensAmt();
  const ay=(4+treble*20*reactAmt())*intensAmt();
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let sx=x+Math.round(Math.sin(y*0.1+t*0.1)*ax);
      let sy=y+Math.round(Math.cos(x*0.1+t*0.12)*ay);
      sx=(sx+w)%w; sy=(sy+h)%h;
      const i=(y*w+x)*4, j=(sy*w+sx)*4;
      d[i]=s[j];d[i+1]=s[j+1];d[i+2]=s[j+2];d[i+3]=255;
    }
  }
}

function fxNoise(src,dst){
  const w=W,h=H,s=src.data,d=dst.data;
  d.set(s);
  const amt=(0.04 + (bass+treble)*0.4*reactAmt())*intensAmt();
  const burst = beat>0.5?amt*2.2:amt;
  for(let i=0;i<d.length;i+=4){
    if(Math.random()<burst){
      const n=Math.random()*255;
      d[i]=n;d[i+1]=n;d[i+2]=n;
    }
  }
}

const PIPELINE = {
  rgbsplit:fxRGBSplit, datamosh:fxDatamosh, scanbend:fxScanBend,
  pixelsort:fxPixelSort, chromashift:fxChroma, echo:fxEcho,
  invert:fxInvert, slice:fxSlice, kaleido:fxKaleido,
  posterize:fxPosterize, wobble:fxWobble, noise:fxNoise
};
// keep a stable order so stacking is predictable
const ORDER = EFFECTS.map(e=>e.id);

// ============================================================
//  RENDER LOOP
// ============================================================
let bufA=null, bufB=null;
function render(){
  requestAnimationFrame(render);
  t++;
  analyze();

  // meter viz
  const lv=Math.min(1,level*3);
  for(let i=0;i<bars.length;i++){
    bars[i].style.height = (Math.max(0.08, lv - i*0.09)*100)+'%';
    bars[i].style.background = i<3?'var(--acid)':i<7?'var(--cyan)':'var(--hot)';
  }

  if(!camOn || video.readyState<2){ return; }
  if(frozen && bufA){ blit(); return; }

  if(W===0) sizeCanvas();

  // draw camera into work buffer (mirrored)
  wctx.save();
  wctx.scale(-1,1); wctx.drawImage(video,-W,0,W,H);
  wctx.restore();

  let img = wctx.getImageData(0,0,W,H);
  if(!bufA||bufA.data.length!==img.data.length){
    bufA=wctx.createImageData(W,H); bufB=wctx.createImageData(W,H);
  }
  let src=img, dst=bufA, other=bufB;

  for(const id of ORDER){
    if(!active.has(id)) continue;
    PIPELINE[id](src, dst);
    // swap
    const tmp=src; src=dst; dst=(src===bufA)?bufB:bufA;
    if(src===img){ /*never*/ }
  }
  wctx.putImageData(src,0,0);
  bufA=src; // keep last for freeze
  blit();
}

function blit(){
  // upscale the chunky buffer to full screen with no smoothing
  octx.imageSmoothingEnabled=false;
  // subtle beat-driven zoom pump
  const pump = 1 + beat*0.02 + bass*0.015*reactAmt();
  const w=out.width, h=out.height;
  const dw=w*pump, dh=h*pump;
  octx.fillStyle='#0a0510'; octx.fillRect(0,0,w,h);
  octx.drawImage(work, (w-dw)/2, (h-dh)/2, dw, dh);
  // vignette
  const g=octx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.55)');
  octx.fillStyle=g; octx.fillRect(0,0,w,h);
}

// init sizing once layout is ready
sizeCanvas();
render();
audioEl.addEventListener('play', ensureAudioCtx);
audioEl.addEventListener('ended',()=>{playBtn.textContent='▶ Play';});
</script>
