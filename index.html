<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ChatZone OS Professional ⚡</title>
    <style>
        /* Retro 2000s OS Aesthetic */
        body {
            background-color: #008080; 
            font-family: "MS Sans Serif", Geneva, sans-serif;
            font-size: 12px;
            color: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none; /* Prevent text selection while dragging */
        }

        /* Desktop Grid */
        .desktop {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            width: 100px;
        }

        .desktop-icon {
            text-align: center;
            cursor: pointer;
            color: white;
            font-size: 11px;
            width: 64px;
        }

        .desktop-icon img {
            width: 32px;
            height: 32px;
            margin-bottom: 5px;
            image-rendering: pixelated;
        }

        .desktop-icon:active span, .desktop-icon.selected span {
            background-color: #000080;
            border: 1px dotted white;
        }

        /* Window Styling */
        .window {
            position: absolute;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            padding: 3px;
            display: none; 
            z-index: 10;
        }

        #chat-window { top: 50px; left: 150px; width: 550px; }
        #admin-panel { top: 100px; left: 200px; width: 350px; }
        #alert-window { top: 200px; left: 300px; width: 400px; z-index: 9999; }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
        }

        .title-bar:active { cursor: grabbing; }

        .title-bar-text {
            font-size: 12px;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .title-bar-controls button {
            padding: 1px 4px;
            font-size: 10px;
            font-weight: bold;
            background-color: #d4d0c8;
            border: 1px solid;
            border-color: #fff #404040 #404040 #fff;
            cursor: pointer;
        }

        .title-bar-controls button:active { border-color: #404040 #fff #fff #404040; }

        /* Window Content */
        .win-content { padding: 5px; }

        .chat-box {
            height: 300px;
            background-color: #fff;
            border: 2px inset #fff;
            overflow-y: scroll;
            padding: 5px;
            font-family: "Courier New", Courier, monospace;
            user-select: text; /* Allow copying chat text */
        }

        .message { margin-bottom: 4px; line-height: 1.3; }
        .timestamp { color: #808080; font-size: 10px; }
        .pm-message { background-color: #ffffcc; border: 1px dashed #cccc00; padding: 2px; }

        /* Input Controls */
        input[type="text"], select {
            padding: 4px;
            border: 2px inset #fff;
            background-color: #fff;
            font-family: inherit;
        }

        button.win-btn {
            padding: 4px 12px;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff;
            font-family: inherit;
            cursor: pointer;
        }

        button.win-btn:active {
            border-color: #404040 #fff #fff #404040;
            padding: 5px 11px 3px 13px;
        }

        /* --- FUN ADMIN EFFECTS --- */
        @keyframes rainbow {
            0% { color: red; } 16% { color: orange; } 33% { color: #ccaa00; }
            50% { color: green; } 66% { color: blue; } 83% { color: purple; } 100% { color: red; }
        }
        .effect-rainbow { animation: rainbow 2s infinite linear; font-weight: bold; text-shadow: 1px 1px #000; }

        @keyframes matrix {
            0% { color: #0f0; text-shadow: 0 0 5px #0f0; }
            50% { color: #fff; text-shadow: 0 0 20px #0f0; }
            100% { color: #0f0; text-shadow: 0 0 5px #0f0; }
        }
        .effect-glow { animation: matrix 1.5s infinite; font-weight: bold; background: #000; padding: 0 4px; }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .earthquake { animation: shake 0.5s infinite; }

        /* Broadcast Alert specific */
        #alert-message { font-size: 14px; font-weight: bold; text-align: center; padding: 20px; color: red; }
        .alert-icon { font-size: 32px; float: left; margin-right: 10px; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="desktop-icon" ondblclick="openWindow('chat-window')">
        <img src="https://win98icons.alexmeub.com/icons/png/network_internet_pcs_pnp-0.png" alt="Chat">
        <span>ChatZone</span>
    </div>
    <div class="desktop-icon" onclick="attemptAdminLogin()">
        <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png" alt="Admin">
        <span>Admin Tools</span>
    </div>
</div>

<div class="window" id="chat-window">
    <div class="title-bar" id="chat-handle">
        <span class="title-bar-text" id="window-title">🌐 ChatZone v3.0 - [Room: lobby]</span>
        <div class="title-bar-controls">
            <button onclick="closeWindow('chat-window')">X</button>
        </div>
    </div>
    <div class="win-content">
        <div style="display: flex; gap: 5px; margin-bottom: 5px; background: #e4e0d8; padding: 5px; border: 1px inset #fff;">
            Name: <input type="text" id="username-input" style="width: 80px;">
            Room: <input type="text" id="room-input" value="lobby" style="width: 80px;">
            <button id="join-btn" class="win-btn">Join</button>
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <input type="text" id="message-input" placeholder="Type message... (/msg User to PM)" style="flex-grow: 1;" autocomplete="off">
            <button id="send-btn" class="win-btn">Send</button>
        </div>
    </div>
</div>

<div class="window" id="admin-panel">
    <div class="title-bar" id="admin-handle" style="background: linear-gradient(90deg, #800000, #ff0000);">
        <span class="title-bar-text">⚠️ Admin Control Center</span>
        <div class="title-bar-controls">
            <button onclick="closeWindow('admin-panel')">X</button>
        </div>
    </div>
    <div class="win-content" style="display: flex; flex-direction: column; gap: 10px;">
        <fieldset style="border: 2px groove #fff; padding: 5px;">
            <legend>Your Persona</legend>
            Name Effect: 
            <select id="admin-effect">
                <option value="none">Normal</option>
                <option value="rainbow">🌈 Rainbow Hack</option>
                <option value="glow">🟩 Matrix Glow</option>
            </select>
        </fieldset>

        <fieldset style="border: 2px groove #fff; padding: 5px;">
            <legend>Global Commands</legend>
            <input type="text" id="admin-broadcast" placeholder="Enter Global Alert..." style="width: 100%; box-sizing: border-box; margin-bottom: 5px;">
            <div style="display: flex; gap: 5px;">
                <button id="btn-broadcast" class="win-btn" style="flex-grow: 1; color: red; font-weight: bold;">Send Alert Popup</button>
                <button id="btn-earthquake" class="win-btn" style="flex-grow: 1;">Trigger Earthquake</button>
            </div>
        </fieldset>
    </div>
</div>

<div class="window" id="alert-window">
    <div class="title-bar" id="alert-handle" style="background: linear-gradient(90deg, #800000, #ff0000);">
        <span class="title-bar-text">System Message</span>
        <div class="title-bar-controls">
            <button onclick="closeWindow('alert-window')">X</button>
        </div>
    </div>
    <div class="win-content">
        <span class="alert-icon">⚠️</span>
        <div id="alert-message">This is a test broadcast.</div>
        <div style="text-align: center; margin-top: 10px;">
            <button class="win-btn" onclick="closeWindow('alert-window')">OK</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBcKpDm14W4GZqQncV1LOtS3Hn5t1kK-hw",
        authDomain: "omegle-c7bdb.firebaseapp.com",
        projectId: "omegle-c7bdb",
        storageBucket: "omegle-c7bdb.firebasestorage.app",
        messagingSenderId: "470349324814",
        appId: "1:470349324814:web:8271072b8d4cd0de01125f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesCollection = collection(db, "messages");

    // --- Window Management (Draggable logic) ---
    window.openWindow = (id) => { 
        document.getElementById(id).style.display = 'block'; 
        bringToFront(document.getElementById(id));
    };
    window.closeWindow = (id) => { document.getElementById(id).style.display = 'none'; };
    
    let zIndexCounter = 100;
    function bringToFront(el) {
        zIndexCounter++;
        el.style.zIndex = zIndexCounter;
    }

    function makeDraggable(winId, handleId) {
        const win = document.getElementById(winId);
        const handle = document.getElementById(handleId);
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        
        win.onmousedown = () => bringToFront(win);
        handle.onmousedown = (e) => {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                win.style.top = (win.offsetTop - pos2) + "px";
                win.style.left = (win.offsetLeft - pos1) + "px";
            };
        };
    }

    makeDraggable('chat-window', 'chat-handle');
    makeDraggable('admin-panel', 'admin-handle');
    makeDraggable('alert-window', 'alert-handle');

    // --- Admin Authentication ---
    let isAdmin = false;
    window.attemptAdminLogin = () => {
        if(isAdmin) { openWindow('admin-panel'); return; }
        if (prompt("Enter Admin Password:") === "KHEMIST") {
            isAdmin = true;
            alert("Access Granted.");
            openWindow('admin-panel');
        } else {
            alert("Access Denied.");
        }
    };

    // --- Core Chat Logic ---
    const usernameInput = document.getElementById('username-input');
    const roomInput = document.getElementById('room-input');
    const messageInput = document.getElementById('message-input');
    const chatBox = document.getElementById('chat-box');
    const adminEffect = document.getElementById('admin-effect');
    
    usernameInput.value = "Guest" + Math.floor(Math.random() * 9000);
    let currentRoom = "lobby";
    let unsubscribe = null;

    function joinRoom(roomCode) {
        if (!roomCode) return;
        currentRoom = roomCode.toLowerCase();
        document.getElementById('window-title').innerText = `🌐 ChatZone v3.0 - [Room: ${currentRoom}]`;

        if (unsubscribe) unsubscribe();

        const q = query(messagesCollection, where("room", "==", currentRoom), orderBy("createdAt", "asc"), limit(50));
        
        unsubscribe = onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = '';
            const currentUser = usernameInput.value.trim().toLowerCase();

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // --- Handle System Commands ---
                if (data.msgType === 'earthquake') {
                    // Trigger shake if it's recent (hacky way to prevent shaking on historical load)
                    if(data.createdAt && (Date.now() - data.createdAt.toMillis() < 5000)) {
                        document.body.classList.add('earthquake');
                        setTimeout(() => document.body.classList.remove('earthquake'), 2000);
                    }
                    return; // Don't render as chat
                }
                if (data.msgType === 'broadcast') {
                    if(data.createdAt && (Date.now() - data.createdAt.toMillis() < 10000)) {
                        document.getElementById('alert-message').innerText = data.text;
                        openWindow('alert-window');
                    }
                    return; // Don't render as chat
                }

                // --- Render Normal/PM Messages ---
                if (data.to && data.to.toLowerCase() !== currentUser && data.username.toLowerCase() !== currentUser) return;

                let timeStr = data.createdAt ? data.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "??:??";
                const msgDiv = document.createElement('div');
                msgDiv.className = data.to ? 'message pm-message' : 'message';
                
                // Determine effect class
                let effectClass = "";
                if (data.effect === 'rainbow') effectClass = "effect-rainbow";
                if (data.effect === 'glow') effectClass = "effect-glow";

                const safeName = escapeHTML(data.username);
                const safeText = escapeHTML(data.text);
                const nameDisplay = `<span class="username ${effectClass}" style="color:${data.isAdmin ? 'red' : '#0000ff'}">&lt;${safeName}&gt;</span>`;

                if (data.to) {
                    msgDiv.innerHTML = `<span class="timestamp">[${timeStr}]</span> <b>[PM]</b> ${nameDisplay} to &lt;${escapeHTML(data.to)}&gt;: ${safeText}`;
                } else {
                    msgDiv.innerHTML = `<span class="timestamp">[${timeStr}]</span> ${nameDisplay}: ${safeText}`;
                }
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    async function sendPayload(text, msgType = 'chat', targetUser = null) {
        if (!text && msgType === 'chat') return;
        
        try {
            await addDoc(messagesCollection, {
                username: isAdmin ? ("★" + usernameInput.value.trim()) : usernameInput.value.trim(),
                text: text,
                room: currentRoom,
                to: targetUser,
                isAdmin: isAdmin,
                msgType: msgType, // 'chat', 'broadcast', 'earthquake'
                effect: isAdmin ? adminEffect.value : 'none',
                createdAt: serverTimestamp()
            });
        } catch (error) { console.error("Error:", error); }
    }

    // Chat UI Listeners
    document.getElementById('join-btn').addEventListener('click', () => joinRoom(roomInput.value.trim()));
    document.getElementById('send-btn').addEventListener('click', () => {
        let text = messageInput.value.trim();
        let target = null;
        if (text.startsWith("/msg ")) {
            const parts = text.split(" ");
            if (parts.length > 2) { target = parts[1]; text = parts.slice(2).join(" "); }
        }
        sendPayload(text, 'chat', target);
        messageInput.value = "";
        messageInput.focus();
    });
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });

    // Admin UI Listeners
    document.getElementById('btn-broadcast').addEventListener('click', () => {
        const txt = document.getElementById('admin-broadcast').value.trim();
        if(txt) { sendPayload(txt, 'broadcast'); document.getElementById('admin-broadcast').value = ""; }
    });
    document.getElementById('btn-earthquake').addEventListener('click', () => {
        sendPayload("SHAKE", 'earthquake');
    });

    // Helper
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // Init
    joinRoom("lobby");
</script>
</body>
</html>
