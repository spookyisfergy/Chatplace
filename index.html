<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATABEND // circuit-bent camera</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Anton&display=swap');
  :root{
    --bg:#0a0510;
    --ink:#e8fff4;
    --hot:#ff2f6d;
    --acid:#c6ff2e;
    --cyan:#25f0e0;
    --violet:#7b2fff;
    --panel:rgba(20,8,34,.74);
    --line:rgba(198,255,46,.22);
    --mono:'DM Mono','Courier New',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);
    overflow:hidden;-webkit-font-smoothing:none;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }
  #stage{position:fixed;inset:0}
  canvas#out{width:100%;height:100%;display:block;image-rendering:pixelated}
  video#cam,canvas#work{display:none}

  /* top bar */
  .bar{
    position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:baseline;gap:14px;
    padding:12px 18px;background:linear-gradient(180deg,rgba(10,5,16,.85),transparent);pointer-events:none;
  }
  .logo{
    font-family:'Anton',sans-serif;font-size:26px;letter-spacing:2px;color:var(--ink);
    text-transform:uppercase;line-height:1;text-shadow:2px 0 var(--hot),-2px 0 var(--cyan);
    animation:jit 4s steps(1) infinite;
  }
  @keyframes jit{0%,92%{transform:translate(0,0)}93%{transform:translate(-2px,1px)}95%{transform:translate(2px,-1px)}97%{transform:translate(-1px,0)}100%{transform:translate(0,0)}}
  .sub{font-size:11px;color:var(--acid);letter-spacing:3px;opacity:.8}
  .rec{margin-left:auto;font-size:11px;color:var(--hot);letter-spacing:2px;display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:#333;box-shadow:0 0 0 1px #000}
  .dot.live{background:var(--hot);box-shadow:0 0 8px var(--hot)}

  /* effect rack */
  .rack{
    position:fixed;top:60px;left:14px;bottom:82px;z-index:20;width:216px;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(6px);
    box-shadow:0 0 0 1px rgba(0,0,0,.6),6px 6px 0 rgba(0,0,0,.35);
  }
  .rack h2{font-size:11px;letter-spacing:3px;color:var(--acid);padding:9px 11px;border-bottom:1px solid var(--line);text-transform:uppercase;display:flex;justify-content:space-between}
  .rack h2 .cnt{color:var(--cyan)}
  .scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--violet) transparent}
  .scroll::-webkit-scrollbar{width:6px}.scroll::-webkit-scrollbar-thumb{background:var(--violet)}
  .cat{font-size:9.5px;letter-spacing:2px;color:var(--cyan);padding:8px 11px 3px;text-transform:uppercase;opacity:.7}
  .fx{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:3px 8px 6px}
  .fx button{
    font-family:var(--mono);font-size:10px;letter-spacing:.3px;color:var(--ink);
    background:rgba(123,47,255,.14);border:1px solid rgba(198,255,46,.24);padding:7px 5px;
    cursor:pointer;text-transform:uppercase;text-align:left;line-height:1.2;transition:transform .05s,background .12s;
  }
  .fx button:hover{background:rgba(198,255,46,.14)}
  .fx button.on{background:var(--acid);color:#0a0510;border-color:var(--acid);box-shadow:0 0 10px rgba(198,255,46,.45)}
  .fx button:active{transform:translate(1px,1px)}
  .rackfoot{display:flex;gap:5px;padding:8px;border-top:1px solid var(--line)}
  .rackfoot button{flex:1;font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
    color:#0a0510;background:var(--cyan);border:none;padding:7px 4px;cursor:pointer}
  .rackfoot button.clr{background:var(--hot);color:#fff}
  .rackfoot button.rnd{background:var(--violet);color:#fff}

  /* color panel */
  .colors{
    position:fixed;top:60px;right:14px;z-index:20;width:200px;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(6px);
    box-shadow:6px 6px 0 rgba(0,0,0,.35);
  }
  .colors h2{font-size:11px;letter-spacing:3px;color:var(--acid);padding:9px 11px;border-bottom:1px solid var(--line);text-transform:uppercase}
  .palrow{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:9px}
  .pal{height:30px;border:1px solid rgba(255,255,255,.15);cursor:pointer;position:relative;overflow:hidden}
  .pal.on{border-color:var(--ink);box-shadow:0 0 8px var(--ink)}
  .swatchrow{display:flex;gap:6px;padding:2px 9px 9px;flex-wrap:wrap}
  .swatchrow label{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:8px;letter-spacing:1px;color:var(--cyan)}
  .swatchrow input[type=color]{width:34px;height:26px;border:1px solid var(--line);background:none;cursor:pointer;padding:0}
  .toggrow{padding:4px 11px 10px;display:flex;flex-direction:column;gap:7px}
  .tog{display:flex;align-items:center;justify-content:space-between;font-size:10px;letter-spacing:1px;color:var(--ink);text-transform:uppercase;cursor:pointer}
  .tog input{accent-color:var(--acid)}
  .colmode{display:flex;gap:4px;padding:2px 9px 10px}
  .colmode button{flex:1;font-family:var(--mono);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink);background:rgba(123,47,255,.16);border:1px solid var(--line);padding:6px 3px;cursor:pointer}
  .colmode button.on{background:var(--acid);color:#0a0510}

  /* bottom deck */
  .deck{
    position:fixed;left:14px;right:14px;bottom:14px;z-index:20;display:flex;flex-wrap:wrap;align-items:center;gap:14px;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(6px);padding:11px 16px;
    box-shadow:6px 6px 0 rgba(0,0,0,.35);
  }
  .grp{display:flex;align-items:center;gap:9px}
  .grp .lab{font-size:10px;letter-spacing:2px;color:var(--acid);text-transform:uppercase}
  button.ctl{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#0a0510;
    background:var(--cyan);border:none;padding:9px 13px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.5);transition:transform .05s}
  button.ctl.alt{background:var(--hot);color:#fff}
  button.ctl.violet{background:var(--violet);color:#fff}
  button.ctl:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5)}
  button.ctl:disabled{opacity:.35;cursor:not-allowed}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:4px;background:rgba(198,255,46,.3);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--acid);border:1px solid #0a0510;box-shadow:0 0 8px var(--acid);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--acid);border:1px solid #0a0510;cursor:pointer}
  .meter{display:flex;gap:2px;align-items:flex-end;height:22px;width:74px}
  .meter i{flex:1;background:var(--violet);height:10%;transition:height .05s}
  .file{position:relative;overflow:hidden}
  .file input{position:absolute;inset:0;opacity:0;cursor:pointer}

  .hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;text-align:center;max-width:440px;pointer-events:none}
  .hint .k{font-family:'Anton',sans-serif;font-size:42px;letter-spacing:2px;color:var(--ink);text-shadow:3px 0 var(--hot),-3px 0 var(--cyan)}
  .hint p{font-size:12px;color:var(--acid);letter-spacing:1.5px;margin-top:12px;line-height:1.9}
  .hint span{color:var(--ink)}

  /* recording state */
  button.ctl.recording{background:var(--hot);color:#fff;animation:recpulse 1s steps(2) infinite}
  @keyframes recpulse{0%{box-shadow:3px 3px 0 rgba(0,0,0,.5),0 0 0 0 rgba(255,47,109,.7)}50%{box-shadow:3px 3px 0 rgba(0,0,0,.5),0 0 0 8px rgba(255,47,109,0)}}
  .rectime{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:40;font-size:12px;letter-spacing:2px;color:#fff;background:var(--hot);padding:4px 12px;display:none;box-shadow:2px 2px 0 rgba(0,0,0,.5)}
  .rectime.on{display:block}
  .rectime b{color:#0a0510}

  @media (max-width:820px){
    .colors{position:fixed;top:auto;bottom:82px;right:14px;width:180px}
    .rack{bottom:auto;top:60px;height:44vh}
  }
  @media (max-width:640px){
    .rack{width:150px}.deck{gap:9px;padding:9px}input[type=range]{width:64px}.logo{font-size:20px}
    .colors{width:150px}
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="out"></canvas>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="work"></canvas>
</div>

<div class="bar">
  <div class="logo">DATABEND</div>
  <div class="sub">CIRCUIT-BENT CAM</div>
  <div class="rec"><span class="dot" id="dot"></span><span id="recTxt">SIGNAL: NONE</span></div>
</div>

<div class="rack">
  <h2>Effect Rack <span class="cnt" id="fxCount">0 ON</span></h2>
  <div class="scroll" id="fxRack"></div>
  <div class="rackfoot">
    <button class="rnd" id="randomize">⚄ Random</button>
    <button id="beatRnd" title="Auto-shuffle on the beat">↻ Auto</button>
    <button class="clr" id="clearFx">✕ Clear</button>
  </div>
</div>

<div class="colors">
  <h2>Color Lab</h2>
  <div class="colmode" id="colMode">
    <button data-m="off" class="on">Off</button>
    <button data-m="duo">Duotone</button>
    <button data-m="tri">Tritone</button>
    <button data-m="gradient">Grad</button>
    <button data-m="glow">Glow</button>
  </div>
  <div class="palrow" id="palRow"></div>
  <div class="swatchrow">
    <label>A<input type="color" id="colA" value="#ff2f6d"></label>
    <label>B<input type="color" id="colB" value="#25f0e0"></label>
    <label>C<input type="color" id="colC" value="#c6ff2e"></label>
    <label>BG<input type="color" id="colBG" value="#0a0510"></label>
  </div>
  <div class="toggrow">
    <label class="tog">Color pulses to beat <input type="checkbox" id="colPulse" checked></label>
    <label class="tog">Mirror image <input type="checkbox" id="mirror" checked></label>
    <label class="tog">CRT scanlines <input type="checkbox" id="crt" checked></label>
  </div>
</div>

<div class="rectime" id="recTime">● REC <b id="recClock">0:00</b></div>

<div class="hint" id="hint">
  <div class="k">NO SIGNAL</div>
  <p>
    <span>1.</span> hit <span>[ ◉ CAM ]</span> &mdash; or load an <span>[ ▨ IMAGE/GIF ]</span><br>
    <span>2.</span> load a <span>[ ♫ TRACK ]</span> or use the <span>[ ≋ MIC ]</span><br>
    <span>3.</span> stack effects, then <span>[ ● RECORD ]</span> the whole thing
  </p>
</div>

<div class="deck">
  <div class="grp">
    <button class="ctl violet" id="camBtn">◉ Cam</button>
    <span class="file"><button class="ctl" id="mediaBtn">▨ Image/GIF</button><input type="file" id="mediaFile" accept="image/*"></span>
    <button class="ctl" id="micBtn">≋ Mic</button>
    <span class="file"><button class="ctl alt" id="fileBtn">♫ Track</button><input type="file" id="audioFile" accept="audio/*"></span>
    <button class="ctl" id="playBtn" disabled>▶ Play</button>
  </div>
  <div class="grp"><span class="lab">Vol</span><input type="range" id="volume" min="0" max="100" value="100"></div>
  <div class="grp"><span class="lab">React</span><input type="range" id="react" min="0" max="200" value="110"></div>
  <div class="grp"><span class="lab">Intensity</span><input type="range" id="intensity" min="0" max="200" value="100"></div>
  <div class="grp"><span class="lab">Level</span><div class="meter" id="meter"></div></div>
  <div class="grp" style="margin-left:auto">
    <button class="ctl" id="recBtn">● Record</button>
    <button class="ctl violet" id="snap">▣ Snap</button>
    <button class="ctl alt" id="freeze">❄ Freeze</button>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ===================================================================
   DATABEND — circuit-bent audio-reactive camera  (expanded build)
   =================================================================== */
const video=document.getElementById('cam');
const work=document.getElementById('work');
const wctx=work.getContext('2d',{willReadFrequently:true});
const out=document.getElementById('out');
const octx=out.getContext('2d');
const audioEl=document.getElementById('audio');

/* ---------- audio ---------- */
let AC,analyser,srcNode,micStream,freqData,timeData;
let bass=0,mid=0,treble=0,level=0,beat=0,lastBeat=0,energyHist=[],beatCount=0;
function ensureAC(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    analyser=AC.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=0.75;
    freqData=new Uint8Array(analyser.frequencyBinCount);
    timeData=new Uint8Array(analyser.frequencyBinCount);
  }
  if(AC.state==='suspended')AC.resume();
}
function connectFile(){
  ensureAC();
  if(srcNode)try{srcNode.disconnect()}catch(e){}
  srcNode=AC.createMediaElementSource(audioEl);
  srcNode.connect(analyser);analyser.connect(AC.destination);
  setSignal('TRACK');
}
async function startMic(){
  ensureAC();
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    if(srcNode)try{srcNode.disconnect()}catch(e){}
    srcNode=AC.createMediaStreamSource(micStream);
    srcNode.connect(analyser);
    setSignal('MIC');audioEl.pause();playBtn.disabled=true;
  }catch(e){alert('Mic access denied.');}
}
function analyze(){
  if(!analyser){bass=mid=treble=level=beat=0;return;}
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const n=freqData.length;let b=0,m=0,t=0;
  const bEnd=Math.floor(n*0.10),mEnd=Math.floor(n*0.45);
  for(let i=0;i<n;i++){const v=freqData[i];if(i<bEnd)b+=v;else if(i<mEnd)m+=v;else t+=v;}
  bass=b/(bEnd*255);mid=m/((mEnd-bEnd)*255);treble=t/((n-mEnd)*255);
  let s=0;for(let i=0;i<timeData.length;i++){const d=(timeData[i]-128)/128;s+=d*d;}
  level=Math.sqrt(s/timeData.length);
  energyHist.push(bass);if(energyHist.length>43)energyHist.shift();
  const avg=energyHist.reduce((a,c)=>a+c,0)/energyHist.length;
  const now=performance.now();
  if(bass>avg*1.35&&bass>0.24&&now-lastBeat>170){beat=1;lastBeat=now;beatCount++;onBeat();}
  else beat=Math.max(0,beat-0.06);
}

/* ---------- signal indicator ---------- */
const dot=document.getElementById('dot'),recTxt=document.getElementById('recTxt');
function setSignal(name){dot.classList.add('live');recTxt.textContent='SIGNAL: '+name;}

/* ---------- source: camera OR image/gif ---------- */
let camOn=false;
let srcMode='none';          // 'cam' | 'media' | 'none'
let mediaEl=null;            // <img> for still or animated gif
let mediaReady=false;
document.getElementById('camBtn').addEventListener('click',async()=>{
  if(camOn){
    if(video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
    camOn=false;document.getElementById('camBtn').textContent='◉ Cam';
    if(srcMode==='cam'){srcMode=(mediaReady?'media':'none');}
    if(srcMode==='none')hint.style.display='block';return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'}});
    video.srcObject=stream;await video.play();
    camOn=true;srcMode='cam';document.getElementById('camBtn').textContent='◉ Cam ON';hint.style.display='none';sizeCanvas();
  }catch(e){alert('Camera access denied or unavailable.');}
});

document.getElementById('mediaFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    mediaEl=img;mediaReady=true;srcMode='media';
    document.getElementById('mediaBtn').textContent='▨ Loaded';
    hint.style.display='none';
    // GIFs keep animating on their own as long as we redraw the <img>
    mediaW=img.naturalWidth;mediaH=img.naturalHeight;sizeCanvas();
  };
  img.onerror=()=>alert('Could not load that image.');
  img.src=url;
});
let mediaW=1280,mediaH=720;

/* ---------- audio controls ---------- */
const playBtn=document.getElementById('playBtn');
document.getElementById('audioFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  audioEl.src=URL.createObjectURL(f);connectFile();playBtn.disabled=false;playBtn.textContent='▶ Play';
});
playBtn.addEventListener('click',()=>{
  ensureAC();
  if(audioEl.paused){audioEl.play();playBtn.textContent='❚❚ Pause';}
  else{audioEl.pause();playBtn.textContent='▶ Play';}
});
document.getElementById('micBtn').addEventListener('click',startMic);

/* ---------- volume ---------- */
const volumeEl=document.getElementById('volume');
volumeEl.addEventListener('input',()=>{audioEl.volume=volumeEl.value/100;});
audioEl.volume=1;

/* ---------- sliders / toggles ---------- */
const reactEl=document.getElementById('react'),intensEl=document.getElementById('intensity');
const reactAmt=()=>reactEl.value/100, intensAmt=()=>intensEl.value/100;
const mirrorEl=document.getElementById('mirror'),crtEl=document.getElementById('crt'),colPulseEl=document.getElementById('colPulse');
// toggle crt scanline overlay
const crtStyle=document.createElement('style');document.head.appendChild(crtStyle);
function refreshCRT(){crtStyle.textContent=crtEl.checked?'':'body::after{display:none}';}
crtEl.addEventListener('change',refreshCRT);refreshCRT();

/* ---------- COLOR LAB ---------- */
let colMode='off';
const colA=document.getElementById('colA'),colB=document.getElementById('colB'),
      colC=document.getElementById('colC'),colBG=document.getElementById('colBG');
function hex(el){const h=el.value;return [parseInt(h.substr(1,2),16),parseInt(h.substr(3,2),16),parseInt(h.substr(5,2),16)];}
const PALETTES=[
  ['#ff2f6d','#25f0e0','#c6ff2e','#0a0510'], // neon
  ['#ff006e','#8338ec','#3a86ff','#000814'], // vaporwave
  ['#f72585','#7209b7','#4cc9f0','#03071e'], // synth
  ['#ffbe0b','#fb5607','#ff006e','#001427'], // sunset
  ['#39ff14','#00e5ff','#ff10f0','#050505'], // rave
  ['#ff0000','#00ff00','#0000ff','#000000'], // rgb raw
  ['#e0aaff','#c77dff','#7b2cbf','#10002b'], // ultraviolet
  ['#f4a261','#e76f51','#2a9d8f','#264653'], // earth
  ['#00ffff','#ff00ff','#ffff00','#000000'], // cmy pop
  ['#ff4d00','#ffb300','#fff700','#1a0500'], // fire
  ['#00ff9f','#00b8ff','#001eff','#000212'], // deep sea
  ['#ffd6e0','#ff85a1','#ff3d7f','#2d0016'], // bubblegum
  ['#d0f4de','#a9def9','#e4c1f9','#1b1b2f'], // pastel
  ['#ffffff','#b8b8b8','#585858','#000000'], // mono
  ['#ff1b6b','#45caff','#ffe700','#0d0221'], // pop art
];
const palRow=document.getElementById('palRow');
PALETTES.forEach((p,idx)=>{
  const d=document.createElement('div');d.className='pal';
  d.style.background=`linear-gradient(135deg,${p[0]} 0 33%,${p[1]} 33% 66%,${p[2]} 66% 100%)`;
  d.addEventListener('click',()=>{
    colA.value=p[0];colB.value=p[1];colC.value=p[2];colBG.value=p[3];
    document.querySelectorAll('.pal').forEach(x=>x.classList.remove('on'));d.classList.add('on');
  });
  palRow.appendChild(d);
});
document.getElementById('colMode').addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  colMode=btn.dataset.m;
  document.querySelectorAll('#colMode button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
});

/* ---------- EFFECT RACK (categorized) ---------- */
const EFFECTS=[
  // GLITCH
  {id:'rgbsplit',name:'RGB Split',cat:'Glitch'},
  {id:'datamosh',name:'Datamosh',cat:'Glitch'},
  {id:'slice',name:'Slice Glitch',cat:'Glitch'},
  {id:'blockglitch',name:'Block Corrupt',cat:'Glitch'},
  {id:'jpegfry',name:'JPEG Fry',cat:'Glitch'},
  {id:'shift',name:'Line Shift',cat:'Glitch'},
  {id:'pixelsort',name:'Pixel Sort',cat:'Glitch'},
  {id:'noise',name:'Static Burst',cat:'Glitch'},
  {id:'dropout',name:'Signal Dropout',cat:'Glitch'},
  {id:'ghosttrail',name:'Ghost Echo',cat:'Glitch'},
  // WARP
  {id:'scanbend',name:'Scan Bend',cat:'Warp'},
  {id:'wobble',name:'Wobble',cat:'Warp'},
  {id:'ripple',name:'Ripple',cat:'Warp'},
  {id:'lens',name:'Fisheye',cat:'Warp'},
  {id:'twist',name:'Vortex',cat:'Warp'},
  {id:'pinch',name:'Pinch',cat:'Warp'},
  {id:'shear',name:'Shear',cat:'Warp'},
  {id:'squares',name:'Grid Shatter',cat:'Warp'},
  // MIRROR
  {id:'kaleido',name:'Kaleido',cat:'Mirror'},
  {id:'mirrorx',name:'Mirror X',cat:'Mirror'},
  {id:'mirrory',name:'Mirror Y',cat:'Mirror'},
  {id:'quad',name:'Quad',cat:'Mirror'},
  {id:'tunnel',name:'Tunnel',cat:'Mirror'},
  // COLOR
  {id:'chromashift',name:'Chroma Wave',cat:'Color'},
  {id:'invert',name:'Bit Crush',cat:'Color'},
  {id:'posterize',name:'Posterize',cat:'Color'},
  {id:'threshold',name:'Threshold',cat:'Color'},
  {id:'hueflow',name:'Hue Flow',cat:'Color'},
  {id:'neon',name:'Neon Edge',cat:'Color'},
  {id:'thermal',name:'Thermal',cat:'Color'},
  {id:'solarize',name:'Solarize',cat:'Color'},

let W=0,H=0,DS=1;
function sizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  out.width=Math.floor(out.clientWidth*dpr);out.height=Math.floor(out.clientHeight*dpr);
  let vw,vh;
  if(srcMode==='media'&&mediaReady){vw=mediaW;vh=mediaH;}
  else{vw=video.videoWidth||1280;vh=video.videoHeight||720;}
  const targetW=480;DS=vw>targetW?targetW/vw:1;
  work.width=Math.max(2,Math.floor(vw*DS));work.height=Math.max(2,Math.floor(vh*DS));
  W=work.width;H=work.height;
  bufA=bufB=echoBuf=feedbackBuf=trailBuf=null;
}

let echoBuf=null,feedbackBuf=null,trailBuf=null,t=0;

/* --- GLITCH --- */
function fxRGBSplit(s,d){
  const amt=(3+bass*24*reactAmt())*intensAmt()|0,w=W,h=H,sd=s.data,dd=d.data;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4,rx=Math.min(w-1,x+amt),bx=Math.max(0,x-amt);
    dd[i]=sd[(y*w+rx)*4];dd[i+1]=sd[i+1];dd[i+2]=sd[(y*w+bx)*4+2];dd[i+3]=255;
  }
}
function fxScanBend(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,amp=(6+mid*44*reactAmt())*intensAmt();
  for(let y=0;y<h;y++){
    const off=Math.round(Math.sin(y*0.15+t*0.08)*amp*(0.4+bass));
    for(let x=0;x<w;x++){let sx=x+off;if(sx<0)sx+=w;if(sx>=w)sx-=w;
      const i=(y*w+x)*4,j=(y*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;}
  }
}
function fxSlice(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const slices=3+Math.floor((bass+treble)*10*reactAmt());
  for(let n=0;n<slices;n++){
    if(Math.random()>0.35+intensAmt()*0.3)continue;
    const sy=Math.floor(Math.random()*h),sh=1+Math.floor(Math.random()*h*0.12);
    const shift=Math.floor((Math.random()*2-1)*w*0.5*intensAmt()*(0.3+bass));
    for(let y=sy;y<Math.min(h,sy+sh);y++)for(let x=0;x<w;x++){
      let sx=x+shift;if(sx<0)sx+=w;if(sx>=w)sx-=w;
      const i=(y*w+x)*4,j=(y*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];
    }
  }
}
function fxBlock(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const n=Math.floor((2+bass*16)*reactAmt()*intensAmt());
  for(let k=0;k<n;k++){
    const bw=8+Math.floor(Math.random()*40),bh=6+Math.floor(Math.random()*30);
    const sx=Math.floor(Math.random()*w),sy=Math.floor(Math.random()*h);
    const dx=Math.floor((Math.random()*2-1)*30),ch=Math.floor(Math.random()*3);
    for(let y=0;y<bh&&sy+y<h;y++)for(let x=0;x<bw&&sx+x<w;x++){
      let px=sx+x+dx;if(px<0||px>=w)continue;
      const i=((sy+y)*w+sx+x)*4,j=((sy+y)*w+px)*4;
      dd[i+ch]=sd[j+ch];
    }
  }
}
function fxJpegFry(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const q=1+Math.floor((bass*10)*reactAmt()*intensAmt());
  const bs=4;
  for(let by=0;by<h;by+=bs)for(let bx=0;bx<w;bx+=bs){
    let r=0,g=0,b=0,c=0;
    for(let y=0;y<bs&&by+y<h;y++)for(let x=0;x<bs&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;r+=sd[i];g+=sd[i+1];b+=sd[i+2];c++;}
    r/=c;g/=c;b/=c;
    r=Math.min(255,r*(1+q*0.15)+((by*bx)%q)*4);
    for(let y=0;y<bs&&by+y<h;y++)for(let x=0;x<bs&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=255;}
  }
}
function fxLineShift(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  for(let y=0;y<h;y++){
    const off=Math.round((Math.sin(y*0.7+t*0.3)+Math.random()*bass*2*reactAmt())*8*intensAmt());
    for(let x=0;x<w;x++){let sx=(x+off+w)%w;const i=(y*w+x)*4,j=(y*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;}
  }
}
function fxPixelSort(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const thresh=120-treble*90*reactAmt();
  for(let y=0;y<h;y+=3){
    let x=0;
    while(x<w){
      let start=x;
      while(x<w){const i=(y*w+x)*4;if((dd[i]+dd[i+1]+dd[i+2])/3<thresh)break;x++;}
      const span=[];for(let k=start;k<x;k++){const i=(y*w+k)*4;span.push([dd[i],dd[i+1],dd[i+2]]);}
      span.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));
      for(let k=start;k<x;k++){const i=(y*w+k)*4,c=span[k-start];dd[i]=c[0];dd[i+1]=c[1];dd[i+2]=c[2];}
      x++;
    }
  }
}
function fxNoise(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const amt=(0.04+(bass+treble)*0.4*reactAmt())*intensAmt(),burst=beat>0.5?amt*2.2:amt;
  for(let i=0;i<dd.length;i+=4)if(Math.random()<burst){const n=Math.random()*255;dd[i]=n;dd[i+1]=n;dd[i+2]=n;}
}
function fxDropout(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const rows=Math.floor((bass*20)*reactAmt()*intensAmt());
  for(let k=0;k<rows;k++){
    const y=Math.floor(Math.random()*h),hh=1+Math.floor(Math.random()*4);
    for(let yy=y;yy<Math.min(h,y+hh);yy++)for(let x=0;x<w;x++){const i=(yy*w+x)*4;dd[i]=dd[i+1]=dd[i+2]=Math.random()<0.5?0:255;}
  }
}
function fxGhost(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  if(!trailBuf||trailBuf.length!==sd.length)trailBuf=new Uint8ClampedArray(sd);
  const decay=0.6+bass*0.35*reactAmt();
  for(let i=0;i<sd.length;i+=4){
    dd[i]=Math.max(sd[i],trailBuf[i]*decay);dd[i+1]=Math.max(sd[i+1],trailBuf[i+1]*decay);dd[i+2]=Math.max(sd[i+2],trailBuf[i+2]*decay);dd[i+3]=255;
  }
  trailBuf.set(dd);
}
function fxDatamosh(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  if(!feedbackBuf||feedbackBuf.length!==sd.length)feedbackBuf=new Uint8ClampedArray(sd);
  const push=(bass*0.85+level)*reactAmt(),block=6;
  for(let y=0;y<h;y+=block)for(let x=0;x<w;x+=block){
    const motion=(Math.sin((x+y)*0.05+t*0.1)*push*14)|0;
    for(let by=0;by<block&&y+by<h;by++)for(let bx=0;bx<block&&x+bx<w;bx++){
      const px=x+bx,py=y+by;let mx=px+motion;if(mx<0)mx=0;if(mx>=w)mx=w-1;
      const i=(py*w+px)*4,j=(py*w+mx)*4;
      dd[i]=sd[j]*0.55+feedbackBuf[i]*0.45;dd[i+1]=sd[j+1]*0.55+feedbackBuf[i+1]*0.45;dd[i+2]=sd[j+2]*0.55+feedbackBuf[i+2]*0.45;dd[i+3]=255;
    }
  }
  feedbackBuf.set(dd);
}

/* --- WARP --- */
function fxWobble(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const ax=(4+bass*24*reactAmt())*intensAmt(),ay=(4+treble*20*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let sx=x+Math.round(Math.sin(y*0.1+t*0.1)*ax),sy=y+Math.round(Math.cos(x*0.1+t*0.12)*ay);
    sx=(sx+w)%w;sy=(sy+h)%h;const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxRipple(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2;
  const amp=(3+bass*30*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy);
    const disp=Math.sin(r*0.12-t*0.2)*amp;
    let sx=Math.round(x+dx/r*disp||x),sy=Math.round(y+dy/r*disp||y);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxLens(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2,R=Math.min(w,h)/2;
  const k=(0.4+bass*1.2*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=(x-cx)/R,dy=(y-cy)/R,r=Math.hypot(dx,dy);
    const f=r<1?(1-k*(1-Math.sqrt(1-r*r))):1;
    let sx=Math.round(cx+dx*R*f),sy=Math.round(cy+dy*R*f);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxTwist(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2;
  const str=(0.002+bass*0.02*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy),a=Math.atan2(dy,dx)+r*str+t*0.005;
    let sx=Math.round(cx+Math.cos(a)*r),sy=Math.round(cy+Math.sin(a)*r);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxPinch(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2,R=Math.min(w,h)/2;
  const amt=(0.3+Math.sin(t*0.05)*0.3+bass*0.5*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=(x-cx),dy=(y-cy),r=Math.hypot(dx,dy)/R;
    const f=Math.pow(Math.min(1,r),amt);
    let sx=Math.round(cx+dx*f),sy=Math.round(cy+dy*f);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxShear(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const sh=(bass*2*reactAmt())*intensAmt();
  for(let y=0;y<h;y++){const off=Math.round((y-h/2)*sh*0.05);
    for(let x=0;x<w;x++){let sx=(x+off+w)%w;const i=(y*w+x)*4,j=(y*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;}
  }
}
function fxSquares(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const gs=16+Math.floor(mid*20);
  for(let gy=0;gy<h;gy+=gs)for(let gx=0;gx<w;gx+=gs){
    const ox=Math.round(Math.sin(gx*0.1+t*0.1)*bass*20*reactAmt()*intensAmt());
    const oy=Math.round(Math.cos(gy*0.1+t*0.1)*bass*20*reactAmt()*intensAmt());
    for(let y=0;y<gs&&gy+y<h;y++)for(let x=0;x<gs&&gx+x<w;x++){
      let px=(gx+x+ox+w)%w,py=(gy+y+oy+h)%h;
      const i=((gy+y)*w+gx+x)*4,j=(py*w+px)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];
    }
  }
}

/* --- MIRROR --- */
function fxKaleido(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2;
  const seg=3+Math.floor(mid*6*reactAmt());
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let dx=x-cx,dy=y-cy,ang=Math.atan2(dy,dx),rad=Math.hypot(dx,dy);
    const slice=Math.PI*2/seg;ang=Math.abs(((ang%slice)+slice)%slice-slice/2)+t*0.01*reactAmt();
    let sx=Math.round(cx+Math.cos(ang)*rad),sy=Math.round(cy+Math.sin(ang)*rad);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxMirrorX(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const src=x<w/2?x:w-1-x,i=(y*w+x)*4,j=(y*w+src)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxMirrorY(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  for(let y=0;y<h;y++){const src=y<h/2?y:h-1-y;
    for(let x=0;x<w;x++){const i=(y*w+x)*4,j=(src*w+x)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;}
  }
}
function fxQuad(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const sx=x<w/2?x:w-1-x,sy=y<h/2?y:h-1-y,i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxTunnel(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=x-cx,dy=y-cy,a=Math.atan2(dy,dx),r=Math.hypot(dx,dy);
    const u=(a/(Math.PI*2)+0.5)*w;
    const v=((100/(r+1)+t*0.5+bass*20*reactAmt())%h+h)%h;
    let sx=Math.floor(u)%w,sy=Math.floor(v);sx=(sx+w)%w;sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}

/* --- COLOR --- */
function fxChroma(s,d){
  const sd=s.data,dd=d.data,shift=(treble*180*reactAmt())*intensAmt();
  for(let i=0;i<sd.length;i+=4){
    const r=sd[i],g=sd[i+1],b=sd[i+2],k=((r+g+b)/3+shift+t*2)%360,f=k/60;
    if(f<1){dd[i]=r;dd[i+1]=g*0.6+b*0.4;dd[i+2]=b;}
    else if(f<2){dd[i]=g;dd[i+1]=r;dd[i+2]=b;}
    else if(f<3){dd[i]=b;dd[i+1]=g;dd[i+2]=r;}
    else if(f<4){dd[i]=r;dd[i+1]=b;dd[i+2]=g;}
    else{dd[i]=g;dd[i+1]=b;dd[i+2]=r;}
    dd[i+3]=255;
  }
}
function fxInvert(s,d){
  const sd=s.data,dd=d.data;
  const levels=Math.max(2,8-Math.floor(bass*6*reactAmt()*intensAmt())),step=255/(levels-1),inv=beat>0.5;
  for(let i=0;i<sd.length;i+=4){
    let r=Math.round(sd[i]/step)*step,g=Math.round(sd[i+1]/step)*step,b=Math.round(sd[i+2]/step)*step;
    if(inv){r=255-r;g=255-g;b=255-b;}dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=255;
  }
}
function fxPosterize(s,d){
  const sd=s.data,dd=d.data,lv=Math.max(2,Math.round(6-treble*4*reactAmt())),step=255/(lv-1);
  for(let i=0;i<sd.length;i+=4){dd[i]=Math.round(sd[i]/step)*step;dd[i+1]=Math.round(sd[i+1]/step)*step;dd[i+2]=Math.round(sd[i+2]/step)*step;dd[i+3]=255;}
}
function fxThreshold(s,d){
  const sd=s.data,dd=d.data,th=110+(bass-treble)*80*reactAmt();
  const [ar,ag,ab]=hex(colA),[br,bg,bb]=hex(colB);
  for(let i=0;i<sd.length;i+=4){
    const lum=(sd[i]+sd[i+1]+sd[i+2])/3;
    if(lum>th){dd[i]=ar;dd[i+1]=ag;dd[i+2]=ab;}else{dd[i]=br;dd[i+1]=bg;dd[i+2]=bb;}dd[i+3]=255;
  }
}
function fxHueFlow(s,d){
  const sd=s.data,dd=d.data,rot=(t*2+bass*120*reactAmt())%360;
  const c=Math.cos(rot*Math.PI/180),sn=Math.sin(rot*Math.PI/180);
  const m=[0.213+c*0.787-sn*0.213,0.715-c*0.715-sn*0.715,0.072-c*0.072+sn*0.928];
  for(let i=0;i<sd.length;i+=4){
    const r=sd[i],g=sd[i+1],b=sd[i+2];
    const nr=r*(0.213+c*0.787-sn*0.213)+g*(0.715-c*0.715-sn*0.715)+b*(0.072-c*0.072+sn*0.928);
    const ng=r*(0.213-c*0.213+sn*0.143)+g*(0.715+c*0.285+sn*0.140)+b*(0.072-c*0.072-sn*0.283);
    const nb=r*(0.213-c*0.213-sn*0.787)+g*(0.715-c*0.715+sn*0.715)+b*(0.072+c*0.928+sn*0.072);
    dd[i]=nr;dd[i+1]=ng;dd[i+2]=nb;dd[i+3]=255;
  }
}
function fxNeon(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const [ar,ag,ab]=hex(colA),[br,bg,bb]=hex(colB),bgc=hex(colBG);
  const gain=1+bass*3*reactAmt()*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4;
    const xr=Math.min(w-1,x+1),yd=Math.min(h-1,y+1);
    const lum=(sd[i]+sd[i+1]+sd[i+2])/3;
    const lr=(sd[(y*w+xr)*4]+sd[(y*w+xr)*4+1]+sd[(y*w+xr)*4+2])/3;
    const ld=(sd[(yd*w+x)*4]+sd[(yd*w+x)*4+1]+sd[(yd*w+x)*4+2])/3;
    let e=(Math.abs(lum-lr)+Math.abs(lum-ld))*gain;e=Math.min(255,e)/255;
    dd[i]=bgc[0]+(ar*0.6+br*0.4-bgc[0])*e;dd[i+1]=bgc[1]+(ag*0.6+bg*0.4-bgc[1])*e;dd[i+2]=bgc[2]+(ab*0.6+bb*0.4-bgc[2])*e;dd[i+3]=255;
  }
}
function fxThermal(s,d){
  const sd=s.data,dd=d.data,sh=treble*100*reactAmt();
  for(let i=0;i<sd.length;i+=4){
    let l=(sd[i]+sd[i+1]+sd[i+2])/3+sh;l=Math.max(0,Math.min(255,l));const t2=l/255;
    let r,g,b;
    if(t2<0.25){r=0;g=0;b=t2*4*255;}
    else if(t2<0.5){r=0;g=(t2-0.25)*4*255;b=255;}
    else if(t2<0.75){r=(t2-0.5)*4*255;g=255;b=255-(t2-0.5)*4*255;}
    else{r=255;g=255-(t2-0.75)*4*255;b=0;}
    dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=255;
  }
}
function fxSolarize(s,d){
  const sd=s.data,dd=d.data,th=128-bass*60*reactAmt();
  for(let i=0;i<sd.length;i+=4){
    dd[i]=sd[i]<th?sd[i]:255-sd[i];dd[i+1]=sd[i+1]<th?sd[i+1]:255-sd[i+1];dd[i+2]=sd[i+2]<th?sd[i+2]:255-sd[i+2];dd[i+3]=255;
  }
}
function fxAscii(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,bgc=hex(colBG),[ar,ag,ab]=hex(colA);
  const gs=4+Math.floor(mid*4);
  for(let by=0;by<h;by+=gs)for(let bx=0;bx<w;bx+=gs){
    let l=0,c=0;for(let y=0;y<gs&&by+y<h;y++)for(let x=0;x<gs&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;l+=(sd[i]+sd[i+1]+sd[i+2])/3;c++;}
    l/=c;const rad=(l/255)*(gs/2);
    for(let y=0;y<gs&&by+y<h;y++)for(let x=0;x<gs&&bx+x<w;x++){
      const dx=x-gs/2,dy=y-gs/2,inside=Math.hypot(dx,dy)<rad;
      const i=((by+y)*w+bx+x)*4;
      if(inside){dd[i]=ar;dd[i+1]=ag;dd[i+2]=ab;}else{dd[i]=bgc[0];dd[i+1]=bgc[1];dd[i+2]=bgc[2];}dd[i+3]=255;
    }
  }
}
function fxBloom(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const th=200-bass*80*reactAmt(),spread=1+Math.floor(bass*3*reactAmt()*intensAmt());
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4,lum=(sd[i]+sd[i+1]+sd[i+2])/3;
    if(lum>th){for(let oy=-spread;oy<=spread;oy++)for(let ox=-spread;ox<=spread;ox++){
      const nx=x+ox,ny=y+oy;if(nx<0||nx>=w||ny<0||ny>=h)continue;const j=(ny*w+nx)*4;
      dd[j]=Math.min(255,dd[j]+sd[i]*0.15);dd[j+1]=Math.min(255,dd[j+1]+sd[i+1]*0.15);dd[j+2]=Math.min(255,dd[j+2]+sd[i+2]*0.15);
    }}
  }
}

function fxDuoChan(s,d){
  const sd=s.data,dd=d.data,[ar,ag,ab]=hex(colA),[br,bg,bb]=hex(colB);
  for(let i=0;i<sd.length;i+=4){
    const lo=sd[i]/255,hi=sd[i+1]/255; // map red->A, green->B, mix
    dd[i]=ar*lo+br*hi;dd[i+1]=ag*lo+bg*hi;dd[i+2]=ab*lo+bb*hi;dd[i+3]=255;
  }
}
function fxEdgeGlow(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const [ar,ag,ab]=hex(colA);const gain=1.5+bass*4*reactAmt()*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4,xr=Math.min(w-1,x+1),yd=Math.min(h-1,y+1);
    const l=(sd[i]+sd[i+1]+sd[i+2]);
    const lr=(sd[(y*w+xr)*4]+sd[(y*w+xr)*4+1]+sd[(y*w+xr)*4+2]);
    const ld=(sd[(yd*w+x)*4]+sd[(yd*w+x)*4+1]+sd[(yd*w+x)*4+2]);
    let e=Math.min(1,(Math.abs(l-lr)+Math.abs(l-ld))/765*gain);
    dd[i]=sd[i]*0.35+ar*e;dd[i+1]=sd[i+1]*0.35+ag*e;dd[i+2]=sd[i+2]*0.35+ab*e;dd[i+3]=255;
  }
}
function fxHueCycle(s,d){
  const sd=s.data,dd=d.data,off=(t*3+bass*160*reactAmt())%360;
  for(let i=0;i<sd.length;i+=4){
    const lum=(sd[i]+sd[i+1]+sd[i+2])/3,H2=(lum/255*360+off)%360,f=H2/60,x2=1-Math.abs(f%2-1);
    let r,g,b;
    if(f<1){r=1;g=x2;b=0;}else if(f<2){r=x2;g=1;b=0;}else if(f<3){r=0;g=1;b=x2;}
    else if(f<4){r=0;g=x2;b=1;}else if(f<5){r=x2;g=0;b=1;}else{r=1;g=0;b=x2;}
    const v=lum;dd[i]=r*v;dd[i+1]=g*v;dd[i+2]=b*v;dd[i+3]=255;
  }
}
/* --- TRIP --- */
function fxFeedback(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  if(!feedbackBuf||feedbackBuf.length!==sd.length)feedbackBuf=new Uint8ClampedArray(sd);
  const z=1+(0.02+bass*0.08*reactAmt())*intensAmt(),cx=w/2,cy=h/2;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let sx=Math.round(cx+(x-cx)/z),sy=Math.round(cy+(y-cy)/z);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;
    dd[i]=sd[i]*0.5+feedbackBuf[j]*0.5;dd[i+1]=sd[i+1]*0.5+feedbackBuf[j+1]*0.5;dd[i+2]=sd[i+2]*0.5+feedbackBuf[j+2]*0.5;dd[i+3]=255;
  }
  feedbackBuf.set(dd);
}
function fxSmear(s,d){
  const sd=s.data,dd=d.data;
  if(!trailBuf||trailBuf.length!==sd.length)trailBuf=new Uint8ClampedArray(sd);
  const k=0.5+treble*0.45*reactAmt();
  for(let i=0;i<sd.length;i+=4){
    dd[i]=sd[i]*(1-k)+trailBuf[i]*k;dd[i+1]=sd[i+1]*(1-k)+trailBuf[i+1]*k;dd[i+2]=sd[i+2]*(1-k)+trailBuf[i+2]*k;dd[i+3]=255;
  }
  trailBuf.set(dd);
}
function fxStrobe(s,d){
  const sd=s.data,dd=d.data;dd.set(sd);
  if(beat>0.5){const inv=Math.random()<0.5;for(let i=0;i<dd.length;i+=4){const v=inv?255-dd[i]:255;dd[i]=v;dd[i+1]=inv?255-dd[i+1]:255;dd[i+2]=inv?255-dd[i+2]:255;}}
}
function fxShockwave(s,d){
  const w=W,h=H,sd=s.data,dd=d.data,cx=w/2,cy=h/2;
  const phase=(t*0.3+beatCount*2)%40;
  const amp=(6+bass*30*reactAmt())*intensAmt();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy);
    const ring=Math.exp(-Math.pow((r-phase*6)/24,2));
    const disp=ring*amp;
    let sx=Math.round(x+(dx/(r||1))*disp),sy=Math.round(y+(dy/(r||1))*disp);
    sx=Math.max(0,Math.min(w-1,sx));sy=Math.max(0,Math.min(h-1,sy));
    const i=(y*w+x)*4,j=(sy*w+sx)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];dd[i+3]=255;
  }
}
function fxMelt(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;dd.set(sd);
  const amt=Math.floor((1+bass*10*reactAmt())*intensAmt());
  for(let x=0;x<w;x++){
    const drop=(Math.floor(Math.sin(x*0.3+t*0.1)*amt)+amt);
    for(let y=h-1;y>=0;y--){
      const sy=Math.max(0,y-drop);const i=(y*w+x)*4,j=(sy*w+x)*4;dd[i]=sd[j];dd[i+1]=sd[j+1];dd[i+2]=sd[j+2];
    }
  }
}
function fxMosaic(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const gs=Math.max(2,Math.round(4+bass*30*reactAmt()*intensAmt()));
  for(let by=0;by<h;by+=gs)for(let bx=0;bx<w;bx+=gs){
    let r=0,g=0,b=0,c=0;
    for(let y=0;y<gs&&by+y<h;y++)for(let x=0;x<gs&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;r+=sd[i];g+=sd[i+1];b+=sd[i+2];c++;}
    r/=c;g/=c;b/=c;
    for(let y=0;y<gs&&by+y<h;y++)for(let x=0;x<gs&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=255;}
  }
}
function fxCRTRoll(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const roll=Math.floor((t*2+bass*40*reactAmt())%h);
  for(let y=0;y<h;y++){const sy=(y+roll)%h;
    for(let x=0;x<w;x++){const i=(y*w+x)*4,j=(sy*w+x)*4;
      const band=(Math.sin((y+t)*0.3)*0.15+0.85);
      dd[i]=sd[j]*band;dd[i+1]=sd[j+1]*band;dd[i+2]=sd[j+2]*band;dd[i+3]=255;}
  }
}
function fxScanMelt(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  if(!trailBuf||trailBuf.length!==sd.length)trailBuf=new Uint8ClampedArray(sd);
  for(let y=0;y<h;y++){
    const pull=(y%3===0)?0.75:0.2;
    for(let x=0;x<w;x++){const i=(y*w+x)*4;
      dd[i]=sd[i]*(1-pull)+trailBuf[i]*pull;dd[i+1]=sd[i+1]*(1-pull)+trailBuf[i+1]*pull;dd[i+2]=sd[i+2]*(1-pull)+trailBuf[i+2]*pull;dd[i+3]=255;}
  }
  trailBuf.set(dd);
}
function fxVoronoi(s,d){
  const w=W,h=H,sd=s.data,dd=d.data;
  const cell=Math.max(6,Math.round(10+mid*24));
  for(let by=0;by<h;by+=cell)for(let bx=0;bx<w;bx+=cell){
    const jx=Math.floor(Math.sin(bx*0.3+t*0.05)*cell*0.4);
    const jy=Math.floor(Math.cos(by*0.3+t*0.05)*cell*0.4);
    const px=Math.max(0,Math.min(w-1,bx+cell/2+jx)),py=Math.max(0,Math.min(h-1,by+cell/2+jy));
    const si=((py|0)*w+(px|0))*4;
    for(let y=0;y<cell&&by+y<h;y++)for(let x=0;x<cell&&bx+x<w;x++){const i=((by+y)*w+bx+x)*4;dd[i]=sd[si];dd[i+1]=sd[si+1];dd[i+2]=sd[si+2];dd[i+3]=255;}
  }
}
function fxTrails(s,d){
  const sd=s.data,dd=d.data;
  if(!echoBuf||echoBuf.length!==sd.length)echoBuf=new Uint8ClampedArray(sd);
  const decay=0.82+bass*0.15*reactAmt();
  for(let i=0;i<sd.length;i+=4){
    const br=(sd[i]+sd[i+1]+sd[i+2])/3;
    const keep=br>140; // bright pixels leave trails
    dd[i]=keep?Math.max(sd[i],echoBuf[i]*decay):sd[i];
    dd[i+1]=keep?Math.max(sd[i+1],echoBuf[i+1]*decay):sd[i+1];
    dd[i+2]=keep?Math.max(sd[i+2],echoBuf[i+2]*decay):sd[i+2];
    dd[i+3]=255;
  }
  echoBuf.set(dd);
}

const PIPELINE={
  rgbsplit:fxRGBSplit,datamosh:fxDatamosh,slice:fxSlice,blockglitch:fxBlock,jpegfry:fxJpegFry,
  shift:fxLineShift,pixelsort:fxPixelSort,noise:fxNoise,dropout:fxDropout,ghosttrail:fxGhost,
  scanbend:fxScanBend,wobble:fxWobble,ripple:fxRipple,lens:fxLens,twist:fxTwist,pinch:fxPinch,shear:fxShear,squares:fxSquares,
  kaleido:fxKaleido,mirrorx:fxMirrorX,mirrory:fxMirrorY,quad:fxQuad,tunnel:fxTunnel,
  chromashift:fxChroma,invert:fxInvert,posterize:fxPosterize,threshold:fxThreshold,hueflow:fxHueFlow,
  neon:fxNeon,thermal:fxThermal,solarize:fxSolarize,ascii:fxAscii,bloom:fxBloom,
  duochan:fxDuoChan,edgeglow:fxEdgeGlow,huecycle:fxHueCycle,
  feedback:fxFeedback,smear:fxSmear,strobe:fxStrobe,shockwave:fxShockwave,melt:fxMelt,
  mosaic:fxMosaic,crthum:fxCRTRoll,scanmelt:fxScanMelt,voronoi:fxVoronoi,trails:fxTrails
};
const ORDER=EFFECTS.map(e=>e.id);

/* ---------- COLOR GRADE (applied after effects) ---------- */
function applyColorGrade(img){
  if(colMode==='off')return;
  const dd=img.data;
  const A=hex(colA),B=hex(colB),C=hex(colC);
  const pulse=colPulseEl.checked?(1+beat*0.5+bass*0.4*reactAmt()):1;
  for(let i=0;i<dd.length;i+=4){
    const lum=Math.min(255,((dd[i]+dd[i+1]+dd[i+2])/3)*pulse)/255;
    let r,g,b;
    if(colMode==='duo'){
      r=A[0]+(B[0]-A[0])*lum;g=A[1]+(B[1]-A[1])*lum;b=A[2]+(B[2]-A[2])*lum;
    }else if(colMode==='tri'){
      if(lum<0.5){const k=lum*2;r=A[0]+(B[0]-A[0])*k;g=A[1]+(B[1]-A[1])*k;b=A[2]+(B[2]-A[2])*k;}
      else{const k=(lum-0.5)*2;r=B[0]+(C[0]-B[0])*k;g=B[1]+(C[1]-B[1])*k;b=B[2]+(C[2]-B[2])*k;}
    }else if(colMode==='glow'){
      // tint shadows toward A, highlights toward C, add saturated bloom
      const q=lum;
      if(q<0.5){const k=q*2;r=A[0]*(1-k)+B[0]*k;g=A[1]*(1-k)+B[1]*k;b=A[2]*(1-k)+B[2]*k;}
      else{const k=(q-0.5)*2;r=B[0]*(1-k)+C[0]*k;g=B[1]*(1-k)+C[1]*k;b=B[2]*(1-k)+C[2]*k;}
      const boost=1+q*q*1.3;r=Math.min(255,r*boost);g=Math.min(255,g*boost);b=Math.min(255,b*boost);
    }else{ // gradient by position + lum
      const k=(lum+Math.sin(t*0.03)*0.2+1)%1;
      if(k<0.5){const q=k*2;r=A[0]+(B[0]-A[0])*q;g=A[1]+(B[1]-A[1])*q;b=A[2]+(B[2]-A[2])*q;}
      else{const q=(k-0.5)*2;r=B[0]+(C[0]-B[0])*q;g=B[1]+(C[1]-B[1])*q;b=B[2]+(C[2]-B[2])*q;}
    }
    dd[i]=r;dd[i+1]=g;dd[i+2]=b;
  }
}

/* ===================================================================
   RENDER LOOP
   =================================================================== */
let bufA=null,bufB=null;
function render(){
  requestAnimationFrame(render);t++;analyze();
  const lv=Math.min(1,level*3);
  for(let i=0;i<bars.length;i++){bars[i].style.height=(Math.max(0.08,lv-i*0.09)*100)+'%';bars[i].style.background=i<3?'var(--acid)':i<7?'var(--cyan)':'var(--hot)';}

  const hasCam = camOn && video.readyState>=2;
  const hasMedia = srcMode==='media' && mediaReady;
  if(!hasCam && !hasMedia)return;
  if(frozen&&bufA){blit();return;}
  if(W===0)sizeCanvas();

  const useMedia = srcMode==='media' && hasMedia;
  wctx.save();
  if(mirrorEl.checked){wctx.scale(-1,1);wctx.drawImage(useMedia?mediaEl:video,-W,0,W,H);}
  else wctx.drawImage(useMedia?mediaEl:video,0,0,W,H);
  wctx.restore();

  let img=wctx.getImageData(0,0,W,H);
  if(!bufA||bufA.data.length!==img.data.length){bufA=wctx.createImageData(W,H);bufB=wctx.createImageData(W,H);}
  let src=img,dst=bufA;
  for(const id of ORDER){
    if(!active.has(id))continue;
    PIPELINE[id](src,dst);
    const tmp=src;src=dst;dst=(src===bufA)?bufB:bufA;
  }
  applyColorGrade(src);
  wctx.putImageData(src,0,0);bufA=src;blit();
}
function blit(){
  octx.imageSmoothingEnabled=false;
  const pump=1+beat*0.02+bass*0.015*reactAmt(),w=out.width,h=out.height,dw=w*pump,dh=h*pump;
  const bgc=colBG.value;octx.fillStyle=bgc;octx.fillRect(0,0,w,h);
  octx.drawImage(work,(w-dw)/2,(h-dh)/2,dw,dh);
  const g=octx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.55)');
  octx.fillStyle=g;octx.fillRect(0,0,w,h);
}

/* ===================================================================
   VIDEO RECORDER  — captures the output canvas + audio to a .webm
   =================================================================== */
let recorder=null,recording=false,recChunks=[],recStart=0,recTimer=null,autoStopOnEnd=false;
const recBtn=document.getElementById('recBtn');
const recTimeEl=document.getElementById('recTime'),recClock=document.getElementById('recClock');

function pickMime(){
  const opts=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  for(const o of opts)if(window.MediaRecorder&&MediaRecorder.isTypeSupported(o))return o;
  return '';
}
function startRecording(){
  if(!camOn && !(srcMode==='media'&&mediaReady)){alert('Turn on the camera or load an image first.');return;}
  ensureAC();
  // video from the visible output canvas
  const canvasStream=out.captureStream(30);
  // mix audio in if we have an analyser source
  if(analyser){
    try{
      const dest=AC.createMediaStreamDestination();
      analyser.connect(dest); // analyser already receives the source
      dest.stream.getAudioTracks().forEach(tk=>canvasStream.addTrack(tk));
    }catch(e){/* no audio track, video only */}
  }
  const mime=pickMime();
  try{ recorder=new MediaRecorder(canvasStream, mime?{mimeType:mime,videoBitsPerSecond:8_000_000}:undefined); }
  catch(e){ alert('Recording not supported in this browser.'); return; }
  recChunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  recorder.onstop=()=>{
    const blob=new Blob(recChunks,{type:mime||'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='databend_'+Date.now()+'.webm';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  };
  recorder.start(100);
  recording=true;recStart=performance.now();
  // if a track is loaded and playing, auto-stop when the song ends and (re)start it from top
  autoStopOnEnd = !audioEl.paused && audioEl.src!=='';
  recBtn.classList.add('recording');recBtn.textContent='■ Stop';
  recTimeEl.classList.add('on');
  recTimer=setInterval(()=>{
    const s=Math.floor((performance.now()-recStart)/1000);
    recClock.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },250);
}
function stopRecording(){
  if(recorder&&recording){recorder.stop();}
  recording=false;clearInterval(recTimer);
  recBtn.classList.remove('recording');recBtn.textContent='● Record';
  recTimeEl.classList.remove('on');
}
recBtn.addEventListener('click',()=>{ recording?stopRecording():startRecording(); });
</script>
</body>
</html>
