<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filthy Prompts</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --accent: #ff2a5f;
            --panel: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .container {
            background: var(--panel);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .hidden { display: none !important; }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover { background: #ff4d79; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .prompt-text { font-size: 1.5rem; font-weight: bold; margin: 1.5rem 0; }
        .player-list { list-style: none; padding: 0; margin-top: 1rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;}
        .player-list li { background: #333; padding: 5px 10px; border-radius: 4px; font-size: 0.9rem; }
        .answer-card {
            background: #2a2a2a;
            padding: 1rem;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .answer-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <h1>Filthy Prompts</h1>

    <div id="login-screen" class="container">
        <h2>Enter the Degeneracy</h2>
        <input type="text" id="username" placeholder="Enter your alias..." autocomplete="off">
        <button onclick="joinGame()">Join Lobby</button>
    </div>

    <div id="game-screen" class="container hidden">
        <div id="lobby-controls">
            <p>Waiting for players...</p>
            <ul id="players" class="player-list"></ul>
            <button onclick="startRound()" id="start-btn">Start Next Round</button>
        </div>

        <div id="active-game" class="hidden">
            <div class="prompt-text" id="current-prompt">Loading prompt...</div>
            
            <div id="submission-phase">
                <input type="text" id="player-answer" placeholder="Type your worst idea here..." autocomplete="off">
                <button onclick="submitAnswer()">Submit Answer</button>
            </div>

            <div id="voting-phase" class="hidden">
                <h3>Vote for the worst/best:</h3>
                <div id="answers-container"></div>
            </div>
            
            <div id="results-phase" class="hidden">
                <h3>Winner:</h3>
                <div id="winner-display" class="prompt-text"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBcKpDm14W4GZqQncV1LOtS3Hn5t1kK-hw",
            authDomain: "omegle-c7bdb.firebaseapp.com",
            projectId: "omegle-c7bdb",
            storageBucket: "omegle-c7bdb.firebasestorage.app",
            messagingSenderId: "470349324814",
            appId: "1:470349324814:web:8271072b8d4cd0de01125f",
            measurementId: "G-P65WBJMXX3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomRef = db.ref('gameRoom');

        let myId = 'user_' + Math.random().toString(36).substr(2, 9);
        let myName = '';
        let currentPhase = 'lobby'; // lobby, answering, voting, results

        // 18+ Comedy Prompts
        const prompts = [
            "The real reason I was banned from the petting zoo was...",
            "Instead of a safe word, I prefer to yell...",
            "My secret weapon in the bedroom is just a mixture of lube and...",
            "What's the worst thing to accidentally text your mother?",
            "The worst thing to hear your surgeon say before you go under is...",
            "What is a terrible substitute for toilet paper?",
            "I got fired from the morgue today because I couldn't stop..."
        ];

        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if (!myName) return alert("Enter a name first.");

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            // Add player to DB
            roomRef.child('players').child(myId).set({ name: myName, score: 0 });

            // Disconnect hook
            roomRef.child('players').child(myId).onDisconnect().remove();

            listenToGameState();
        }

        function listenToGameState() {
            roomRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                
                // Update Players List
                const playersUl = document.getElementById('players');
                playersUl.innerHTML = '';
                if (data.players) {
                    Object.values(data.players).forEach(p => {
                        playersUl.innerHTML += `<li>${p.name} (${p.score || 0})</li>`;
                    });
                }

                // Handle Phases
                if (data.phase) {
                    currentPhase = data.phase;
                    document.getElementById('lobby-controls').classList.add('hidden');
                    document.getElementById('active-game').classList.remove('hidden');
                    document.getElementById('current-prompt').innerText = data.currentPrompt || "";

                    if (currentPhase === 'answering') {
                        document.getElementById('submission-phase').classList.remove('hidden');
                        document.getElementById('voting-phase').classList.add('hidden');
                        document.getElementById('results-phase').classList.add('hidden');
                    } 
                    else if (currentPhase === 'voting') {
                        document.getElementById('submission-phase').classList.add('hidden');
                        document.getElementById('voting-phase').classList.remove('hidden');
                        renderVoting(data.answers || {});
                    }
                    else if (currentPhase === 'results') {
                        document.getElementById('voting-phase').classList.add('hidden');
                        document.getElementById('results-phase').classList.remove('hidden');
                        calculateWinner(data.votes, data.answers);
                        setTimeout(() => { document.getElementById('lobby-controls').classList.remove('hidden'); }, 5000);
                    }
                } else {
                    document.getElementById('lobby-controls').classList.remove('hidden');
                    document.getElementById('active-game').classList.add('hidden');
                }
            });
        }

        function startRound() {
            const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
            roomRef.update({
                phase: 'answering',
                currentPrompt: randomPrompt,
                answers: null,
                votes: null
            });

            // Auto-advance to voting after 30 seconds
            setTimeout(() => { roomRef.update({ phase: 'voting' }); }, 30000);
            // Auto-advance to results after 60 seconds
            setTimeout(() => { roomRef.update({ phase: 'results' }); }, 60000);
        }

        function submitAnswer() {
            const answer = document.getElementById('player-answer').value.trim();
            if (!answer) return;
            
            roomRef.child('answers').child(myId).set({
                text: answer,
                authorId: myId,
                authorName: myName
            });
            document.getElementById('submission-phase').innerHTML = "<p>Waiting for other degenerates...</p>";
        }

        function renderVoting(answers) {
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            Object.values(answers).forEach(ans => {
                // Don't let people vote for themselves
                if (ans.authorId !== myId) {
                    const div = document.createElement('div');
                    div.className = 'answer-card';
                    div.innerText = ans.text;
                    div.onclick = () => submitVote(ans.authorId);
                    container.appendChild(div);
                }
            });
        }

        function submitVote(authorId) {
            roomRef.child('votes').child(myId).set(authorId);
            document.getElementById('voting-phase').innerHTML = "<p>Vote cast. Judging others...</p>";
        }

        function calculateWinner(votes, answers) {
            if (!votes || !answers) {
                document.getElementById('winner-display').innerText = "Nobody voted. You all suck.";
                return;
            }

            let voteCounts = {};
            Object.values(votes).forEach(votedId => {
                voteCounts[votedId] = (voteCounts[votedId] || 0) + 1;
            });

            let winningId = Object.keys(voteCounts).reduce((a, b) => voteCounts[a] > voteCounts[b] ? a : b);
            let winningAnswer = answers[winningId];

            document.getElementById('winner-display').innerHTML = `
                "${winningAnswer.text}" <br>
                <span style="font-size: 1rem; color: #888;">- ${winningAnswer.authorName}</span>
            `;

            // Give winner a point
            if (winningId === myId) {
                roomRef.child('players').child(myId).child('score').transaction(score => (score || 0) + 1);
            }
        }
    </script>
</body>
</html>
