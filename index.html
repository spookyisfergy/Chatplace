<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mega Multiplayer Sandbox</title>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root {
            --accent: #e67e22;
            --bg: #1a1a1a;
            --panel: #2d2d2d;
        }
        html, body {
            width: 100%; height: 100%; margin: 0;
            background-color: #000; color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh;
            padding-top: 20px;
        }
        .header { margin-bottom: 10px; text-align: center; }
        .header h1 { font-size: 14px; margin: 0 0 5px 0; color: var(--accent); }
        
        canvas {
            border: 4px solid #333;
            image-rendering: pixelated;
            background: #050505;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            width: 512px; height: 512px;
            max-width: 95vw; max-height: 60vh;
        }
        
        .ui-panel {
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: flex; flex-direction: column; gap: 10px;
            width: 90%; max-width: 600px;
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        button {
            background: #444; color: #fff; border: none;
            padding: 10px 5px; font-size: 8px; cursor: pointer;
            border-bottom: 3px solid #222;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        button:hover { background: #555; }
        button.active { 
            background: var(--accent); 
            border-bottom: 3px solid #a05a1a;
            transform: translateY(2px);
        }
        
        .meta-controls {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #444; padding-top: 10px;
        }

        #status { font-size: 7px; color: #aaa; }
        .btn-special { background: #34495e; }
        .btn-online { background: #27ae60; }
        .btn-online.active { background: #c0392b; }

        @media (max-width: 600px) {
            .header h1 { font-size: 10px; }
            button { font-size: 6px; padding: 8px 2px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h1>ELEMENTAL REALMS</h1>
        <div id="status">INITIALIZING...</div>
    </div>

    <canvas id="sandCanvas"></canvas>
    
    <div class="ui-panel">
        <div class="element-grid" id="controls">
            <!-- Elements dynamically generated -->
        </div>
        
        <div class="meta-controls">
            <div style="display: flex; gap: 5px;">
                <button onclick="clearGrid()" class="btn-special">Reset World</button>
                <button onclick="toggleOnline()" id="sync-btn" class="btn-online">Go Online</button>
            </div>
            <div id="brush-info" style="font-size: 8px;">Brush: 2px</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Simulation Constants ---
    const WIDTH = 128; 
    const HEIGHT = 128;
    const EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, FIRE = 4, WOOD = 5, GUNPOWDER = 6, ACID = 7, STEAM = 8;

    const ELEMENTS = {
        [EMPTY]: { name: 'Eraser', color: '#000000' },
        [SAND]: { name: 'Sand', color: '#f1c40f' },
        [WATER]: { name: 'Water', color: '#3498db' },
        [WALL]: { name: 'Steel', color: '#7f8c8d' },
        [WOOD]: { name: 'Wood', color: '#a36629' },
        [FIRE]: { name: 'Fire', color: '#e67e22' },
        [GUNPOWDER]: { name: 'Powder', color: '#555555' },
        [ACID]: { name: 'Acid', color: '#2ecc71' },
        [STEAM]: { name: 'Steam', color: '#bdc3c7' }
    };

    // --- State Management ---
    let grid = Array(HEIGHT).fill().map(() => new Uint8Array(WIDTH));
    let currentElement = SAND;
    let brushSize = 2;
    let isOnline = false;
    let lastPush = 0;
    let user = null;
    let unsubscribeSync = null;

    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // --- Firebase Init ---
    const firebaseConfig = {
        apiKey: "AIzaSyC8qE-Un_cYYMQ_raNkFgsCYQtj3G94oYI",
        authDomain: "boxelgame-aa8c3.firebaseapp.com",
        projectId: "boxelgame-aa8c3",
        storageBucket: "boxelgame-aa8c3.firebasestorage.app",
        messagingSenderId: "552029723760",
        appId: "1:552029723760:web:468d6e2ed3acd2346668b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'mega-sandbox-v2'; // unique path ID

    // --- Auth & Sync ---
    const initAuth = async () => {
        try {
            await signInAnonymously(auth);
        } catch (e) {
            console.error("Auth Error:", e);
            document.getElementById('status').innerText = "Auth Error: Enable Anon Login";
        }
    };
    initAuth();

    onAuthStateChanged(auth, (u) => {
        user = u;
        if(u) {
            document.getElementById('status').innerText = "SYSTEM READY (OFFLINE)";
        }
    });

    window.toggleOnline = async () => {
        if (!user) {
            document.getElementById('status').innerText = "WAITING FOR AUTH...";
            return;
        }

        const btn = document.getElementById('sync-btn');
        const status = document.getElementById('status');
        
        if (!isOnline) {
            isOnline = true;
            btn.innerText = "Disconnect";
            btn.classList.add('active');
            status.innerText = "CONNECTING...";
            
            const worldDocRef = doc(db, 'artifacts', appId, 'public', 'world_v2');
            
            try {
                const initialSnap = await getDoc(worldDocRef);
                if (initialSnap.exists()) {
                    updateLocalGrid(initialSnap.data().gridData);
                }
            } catch(e) { console.warn("New world started."); }

            unsubscribeSync = onSnapshot(worldDocRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    // Don't overwrite our own drawing while we are actively drawing
                    if (data.updatedBy !== user.uid && Date.now() - lastPush > 1200) {
                        updateLocalGrid(data.gridData);
                        status.innerText = "REALM SYNCED";
                    }
                }
            }, (err) => {
                console.error("Sync Error:", err);
                status.innerText = "SYNC ERROR: CHECK RULES";
                isOnline = false;
                btn.innerText = "Go Online";
                btn.classList.remove('active');
            });
        } else {
            isOnline = false;
            if (unsubscribeSync) unsubscribeSync();
            btn.innerText = "Go Online";
            btn.classList.remove('active');
            status.innerText = "OFFLINE MODE";
        }
    };

    function updateLocalGrid(jsonStr) {
        try {
            const flat = JSON.parse(jsonStr);
            for(let y=0; y<HEIGHT; y++) {
                grid[y].set(flat.slice(y*WIDTH, (y+1)*WIDTH));
            }
        } catch(e) { console.error("Parse failed", e); }
    }

    async function pushToCloud() {
        if (!isOnline || !user) return;
        lastPush = Date.now();
        const flat = new Uint8Array(WIDTH * HEIGHT);
        for(let y=0; y<HEIGHT; y++) flat.set(grid[y], y*WIDTH);
        
        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'world_v2'), {
                gridData: JSON.stringify(Array.from(flat)),
                updatedBy: user.uid,
                ts: Date.now()
            });
        } catch(e) { console.error("Save error:", e); }
    }

    // --- Game Engine ---
    function updatePhysics() {
        const xDir = Math.random() > 0.5 ? 1 : -1;
        for (let y = HEIGHT - 1; y >= 0; y--) {
            for (let x = 0; x < WIDTH; x++) {
                const type = grid[y][x];
                if (type === EMPTY || type === WALL) continue;

                if (type === SAND || type === GUNPOWDER) {
                    if (y < HEIGHT - 1) {
                        if (grid[y+1][x] === EMPTY || grid[y+1][x] === WATER || grid[y+1][x] === ACID) {
                            const temp = grid[y+1][x];
                            grid[y+1][x] = type; grid[y][x] = temp;
                        } else if (x + xDir >= 0 && x + xDir < WIDTH && grid[y+1][x+xDir] === EMPTY) {
                            grid[y+1][x+xDir] = type; grid[y][x] = EMPTY;
                        }
                    }
                }
                else if (type === WATER || type === ACID) {
                    if (y < HEIGHT - 1 && (grid[y+1][x] === EMPTY || (type === ACID && grid[y+1][x] === WATER))) {
                        const temp = grid[y+1][x];
                        grid[y+1][x] = type; grid[y][x] = temp;
                    } else {
                        const side = Math.random() > 0.5 ? 1 : -1;
                        if (x + side >= 0 && x + side < WIDTH && grid[y][side+x] === EMPTY) {
                            grid[y][side+x] = type; grid[y][x] = EMPTY;
                        }
                    }
                    if (type === ACID) {
                        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                            const nx = x+dx, ny = y+dy;
                            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
                                if ((grid[ny][nx] === WOOD || grid[ny][nx] === SAND) && Math.random() < 0.04) {
                                    grid[ny][nx] = EMPTY;
                                    grid[y][x] = Math.random() < 0.2 ? STEAM : EMPTY;
                                }
                            }
                        });
                    }
                }
                else if (type === FIRE) {
                    if (Math.random() < 0.08) grid[y][x] = Math.random() < 0.2 ? STEAM : EMPTY;
                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                        const nx = x+dx, ny = y+dy;
                        if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
                            const target = grid[ny][nx];
                            if (target === WOOD && Math.random() < 0.1) grid[ny][nx] = FIRE;
                            if (target === GUNPOWDER) {
                                grid[ny][nx] = FIRE;
                                for(let i=-2; i<=2; i++) {
                                    for(let j=-2; j<=2; j++) {
                                        let ex = nx+i, ey = ny+j;
                                        if (ex>=0 && ex<WIDTH && ey>=0 && ey<HEIGHT && grid[ey][ex] !== WALL && Math.random() < 0.4) grid[ey][ex] = FIRE;
                                    }
                                }
                            }
                            if (target === WATER) { grid[ny][nx] = STEAM; grid[y][x] = EMPTY; }
                        }
                    });
                    if (y > 0 && grid[y-1][x] === EMPTY && Math.random() < 0.15) {
                        grid[y-1][x] = FIRE; grid[y][x] = EMPTY;
                    }
                }
                else if (type === STEAM) {
                    if (y > 0 && grid[y-1][x] === EMPTY) {
                        grid[y-1][x] = STEAM; grid[y][x] = EMPTY;
                    } else if (Math.random() < 0.015) {
                        grid[y][x] = Math.random() < 0.1 ? WATER : EMPTY;
                    } else {
                        const side = Math.random() > 0.5 ? 1 : -1;
                        if (x+side >= 0 && x+side < WIDTH && grid[y][x+side] === EMPTY) {
                            grid[y][x+side] = STEAM; grid[y][x] = EMPTY;
                        }
                    }
                }
            }
        }
    }

    function draw() {
        const imageData = ctx.createImageData(WIDTH, HEIGHT);
        const data = imageData.data;
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                const idx = (y * WIDTH + x) * 4;
                const type = grid[y][x];
                const colorHex = ELEMENTS[type].color;
                data[idx] = parseInt(colorHex.slice(1,3), 16);
                data[idx+1] = parseInt(colorHex.slice(3,5), 16);
                data[idx+2] = parseInt(colorHex.slice(5,7), 16);
                data[idx+3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    // --- UI Init ---
    const controls = document.getElementById('controls');
    Object.entries(ELEMENTS).forEach(([id, info]) => {
        const btn = document.createElement('button');
        btn.innerText = info.name;
        btn.id = `btn-${id}`;
        btn.style.borderLeft = `4px solid ${info.color}`;
        if (id == SAND) btn.className = 'active';
        btn.onclick = () => {
            currentElement = parseInt(id);
            document.querySelectorAll('.element-grid button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        controls.appendChild(btn);
    });

    window.clearGrid = () => {
        for(let y=0; y<HEIGHT; y++) grid[y].fill(0);
        if (isOnline) pushToCloud();
    };

    // --- Input Handling ---
    let isDrawing = false;
    const handleInput = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = Math.floor((clientX - rect.left) / (rect.width / WIDTH));
        const y = Math.floor((clientY - rect.top) / (rect.height / HEIGHT));
        
        for(let i = -brushSize; i <= brushSize; i++) {
            for(let j = -brushSize; j <= brushSize; j++) {
                const nx = x + i, ny = y + j;
                if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
                    if (currentElement === EMPTY || grid[ny][nx] === EMPTY || grid[ny][nx] === WATER) {
                        grid[ny][nx] = currentElement;
                    }
                }
            }
        }
    };

    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => {
        if (isDrawing && isOnline) pushToCloud();
        isDrawing = false;
    });
    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchend', () => {
        if (isDrawing && isOnline) pushToCloud();
        isDrawing = false;
    });

    function loop() {
        updatePhysics();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
