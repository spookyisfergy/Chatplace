<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ChatZone 2000 ⚡</title>
    <style>
        /* Retro 2000s OS Aesthetic */
        body {
            background-color: #008080; /* Classic Win95/98 Teal */
            font-family: "MS Sans Serif", Geneva, sans-serif;
            font-size: 12px;
            color: #000;
            margin: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .window {
            width: 500px;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            padding: 3px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .title-bar-controls button {
            padding: 1px 4px;
            font-size: 9px;
            font-weight: bold;
            background-color: #d4d0c8;
            border: 1px solid;
            border-color: #fff #404040 #404040 #fff;
            cursor: pointer;
        }

        .menu-bar {
            display: flex;
            gap: 10px;
            padding: 4px 5px;
            border-bottom: 1px solid #808080;
            margin-bottom: 5px;
        }

        .menu-item {
            text-decoration: underline;
            cursor: pointer;
        }

        /* Chat Layout */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
        }

        .setup-box {
            display: flex;
            gap: 5px;
            align-items: center;
            background: #e4e0d8;
            padding: 5px;
            border: 1px inset #fff;
        }

        .chat-box {
            height: 250px;
            background-color: #fff;
            border: 2px inset #fff;
            overflow-y: scroll;
            padding: 5px;
            font-family: "Courier New", Courier, monospace;
        }

        .message {
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .timestamp {
            color: #808080;
            font-size: 10px;
        }

        .username {
            font-weight: bold;
            color: #0000ff;
        }

        /* Input Controls */
        .input-area {
            display: flex;
            gap: 5px;
        }

        input[type="text"] {
            padding: 4px;
            border: 2px inset #fff;
            background-color: #fff;
            font-family: inherit;
        }

        #username-input {
            width: 100px;
        }

        #message-input {
            flex-grow: 1;
        }

        button.win-btn {
            padding: 4px 12px;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff;
            font-family: inherit;
            cursor: pointer;
        }

        button.win-btn:active {
            border-color: #404040 #fff #fff #404040;
            padding: 5px 11px 3px 13px;
        }

        .status-bar {
            margin-top: 5px;
            border: 2px inset #fff;
            padding: 2px 5px;
            background: #d4d0c8;
            color: #404040;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span class="title-bar-text">🌐 ChatZone v1.2 - [Room: Lobby]</span>
        <div class="title-bar-controls">
            <button>_</button>
            <button>X</button>
        </div>
    </div>

    <div class="menu-bar">
        <span class="menu-item">File</span>
        <span class="menu-item">Edit</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Help</span>
    </div>

    <div class="chat-container">
        <div class="setup-box">
            <label for="username-input">Screen Name:</label>
            <input type="text" id="username-input" value="Guest_99">
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message"><span class="timestamp">[00:00]</span> <span class="username" style="color:red;">System:</span> Welcome to ChatZone! Type a message and hit Send.</div>
        </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type your instant message here..." autocomplete="off">
            <button id="send-btn" class="win-btn">Send</button>
        </div>
    </div>

    <div class="status-bar">
        Status: Connected to Firebase Server // 56k Modem Mode
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your provided Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBcKpDm14W4GZqQncV1LOtS3Hn5t1kK-hw",
        authDomain: "omegle-c7bdb.firebaseapp.com",
        projectId: "omegle-c7bdb",
        storageBucket: "omegle-c7bdb.firebasestorage.app",
        messagingSenderId: "470349324814",
        appId: "1:470349324814:web:8271072b8d4cd0de01125f",
        measurementId: "G-P65WBJMXX3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesCollection = collection(db, "messages");

    // Randomize initial screen name to look authentic
    document.getElementById('username-input').value = "User" + Math.floor(Math.random() * 9000 + 1000);

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const usernameInput = document.getElementById('username-input');
    const sendBtn = document.getElementById('send-btn');

    // 1. Send Message to Firestore
    async function sendMessage() {
        const text = messageInput.value.trim();
        const username = usernameInput.value.trim() || "Anonymous";

        if (text === "") return;

        try {
            await addDoc(messagesCollection, {
                username: username,
                text: text,
                createdAt: serverTimestamp()
            });
            messageInput.value = ""; // Clear input field
            messageInput.focus();
        } catch (error) {
            console.error("Error adding document: ", error);
        }
    }

    // Event Listeners for sending
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // 2. Listen to Real-Time Updates from Firestore
    const q = query(messagesCollection, orderBy("createdAt", "asc"), limit(100));
    
    onSnapshot(q, (snapshot) => {
        // Clear screen except for the first system message
        chatBox.innerHTML = `<div class="message"><span class="timestamp">[00:00]</span> <span class="username" style="color:red;">System:</span> Welcome to ChatZone! Type a message and hit Send.</div>`;
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            if (!data.text) return;

            // Generate a simple retro timestamp
            let timeStr = "??:??";
            if (data.createdAt) {
                const date = data.createdAt.toDate();
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            // Create message element
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <span class="timestamp">[${timeStr}]</span> 
                <span class="username">&lt;${escapeHTML(data.username)}&gt;:</span> 
                <span class="text">${escapeHTML(data.text)}</span>
            `;
            chatBox.appendChild(msgDiv);
        });

        // Auto-scroll to the bottom like real chat applications
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Helper function to prevent script injections (XSS)
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }
</script>
</body>
</html>
